<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Nexora - Categorías</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Nexora</h2>
                <p>Panel de gestión</p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Dashboard
                </a>
                <a href="/pos" class="nav-item">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    Facturar
                </a>
                <a href="/citas" class="nav-item">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Citas
                </a>
                <a href="/reportes" class="nav-item">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    Reportes
                </a>
                <a href="/servicios" class="nav-item">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    Servicios
                </a>
                <a href="/categorias" class="nav-item active">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
                    Categorías
                </a>
                <a href="/clientes" class="nav-item">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    Clientes
                </a>
                <a href="/usuarios" class="nav-item admin-only">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    Usuarios
                </a>
                <a href="/configuracion" class="nav-item admin-only">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Configuración
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <div class="user-details">
                        <h4 id="userName">Usuario</h4>
                        <span id="userRole">Rol</span>
                    </div>
                </div>
                <button onclick="logout()" class="btn btn-secondary btn-sm mt-2" style="width: 100%;">Cerrar Sesión</button>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="page-header">
                <h1>Categorías de Servicios</h1>
                <button class="btn btn-primary" onclick="openModal()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Nueva Categoría
                </button>
            </div>
            
            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Servicios</th>
                                <th>Estado</th>
                                <th>Fecha</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="categoriasTable">
                            <tr><td colspan="5"><div class="spinner"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" style="max-width: 400px;">
            <div class="modal-header">
                <h3 id="modalTitle">Nueva Categoría</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="categoriaForm">
                <div class="modal-body">
                    <input type="hidden" id="categoriaId">
                    <div class="form-group">
                        <label for="nombre">Nombre de la categoría</label>
                        <input type="text" id="nombre" required>
                    </div>
                    <div class="form-group" id="estadoGroup" style="display: none;">
                        <label for="estado">Estado</label>
                        <select id="estado">
                            <option value="activo">Activo</option>
                            <option value="inactivo">Inactivo</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="/js/api.js"></script>
    <script>
        let editingId = null;
        
        document.addEventListener('DOMContentLoaded', async () => {
            const licenseOk = await requireLicense();
            if (!licenseOk) return;
            
            const session = await checkSession();
            if (!session || !session.authenticated) {
                window.location.href = '/';
                return;
            }
            
            document.getElementById('userName').textContent = session.user.nombre;
            document.getElementById('userRole').textContent = session.user.rol === 'admin' ? 'Administrador' : 'Empleado';
            document.getElementById('userAvatar').textContent = session.user.nombre.charAt(0).toUpperCase();
            
            if (session.user.rol !== 'admin') {
                document.querySelector('.page-header button').style.display = 'none';
            }
            
            const status = await checkLicense();
            if (status.type === 'trial' && status.daysRemaining > 0) {
                showTrialBanner(status.daysRemaining);
            }
            
            await loadCategorias();
            
            document.getElementById('categoriaForm').addEventListener('submit', handleSubmit);
        });
        
        async function loadCategorias() {
            const tbody = document.getElementById('categoriasTable');
            tbody.innerHTML = getSkeletonHTML('table', 5);
            
            try {
                const categorias = await apiCall('/categories');
                
                if (categorias.length === 0) {
                    tbody.innerHTML = getEmptyStateHTML(
                        '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>',
                        'Sin categorías registradas',
                        'Crea categorías para organizar tus servicios.',
                        'Agregar Categoría',
                        'openModal()'
                    ).replace('<div class="empty-state">', '<tr><td colspan="5"><div class="empty-state">').replace('</div>', '</div></td></tr>');
                    return;
                }
                
                tbody.innerHTML = categorias.map(c => {
                    const nombreEsc = (c.nombre || '').replace(/'/g, "\\'");
                    return `
                    <tr class="fade-in">
                        <td><strong>${escapeHtml(c.nombre)}</strong></td>
                        <td>${c.cantidad_servicios}</td>
                        <td><span class="badge badge-${c.estado === 'activo' ? 'success' : 'danger'}">${c.estado}</span></td>
                        <td>${formatDate(c.fecha_creacion)}</td>
                        <td class="actions">
                            ${sessionStorage.getItem('userRol') === 'admin' ? 
                                `<button class="btn btn-secondary btn-sm" onclick="editCategoria(${c.id})">Editar</button>
                                 <button class="btn btn-danger btn-sm" onclick="deleteCategoria(${c.id}, '${nombreEsc}')">Eliminar</button>` : 
                                ''}
                        </td>
                    </tr>
                `}).join('');
            } catch (error) {
                tbody.innerHTML = getEmptyStateHTML(
                    '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>',
                    'Error al cargar categorías',
                    'No se pudieron cargar las categorías. Intenta de nuevo.'
                ).replace('<div class="empty-state">', '<tr><td colspan="5"><div class="empty-state">').replace('</div>', '</div></td></tr>');
            }
        }
        
        function openModal(id = null) {
            editingId = id;
            document.getElementById('modalTitle').textContent = id ? 'Editar Categoría' : 'Nueva Categoría';
            document.getElementById('estadoGroup').style.display = id ? 'block' : 'none';
            document.getElementById('categoriaForm').reset();
            
            if (id) {
                loadCategoria(id);
            }
            
            document.getElementById('modalOverlay').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            editingId = null;
        }
        
        async function loadCategoria(id) {
            try {
                const categoria = await apiCall(`/categories/${id}`);
                document.getElementById('categoriaId').value = categoria.id;
                document.getElementById('nombre').value = categoria.nombre;
                document.getElementById('estado').value = categoria.estado;
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function editCategoria(id) {
            openModal(id);
        }
        
        async function handleSubmit(e) {
            e.preventDefault();
            
            const nombreInput = document.getElementById('nombre');
            if (!validateField(nombreInput, validators.required)) return;
            
            const data = {
                nombre: nombreInput.value.trim().toUpperCase(),
                estado: document.getElementById('estado').value
            };
            
            try {
                if (editingId) {
                    await apiCall(`/categories/${editingId}`, {
                        method: 'PUT',
                        body: JSON.stringify(data)
                    });
                    showToast('Categoría actualizada correctamente', 'success');
                } else {
                    await apiCall('/categories', {
                        method: 'POST',
                        body: JSON.stringify(data)
                    });
                    showToast('Categoría creada correctamente', 'success');
                }
                
                closeModal();
                await loadCategorias();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function logout() {
            await apiCall('/auth/logout', { method: 'POST' });
            clearSessionStorage();
            window.location.href = '/';
        }
        
        async function deleteCategoria(id, nombre) {
            if (!confirm(`¿Está seguro que desea eliminar la categoría "${nombre}"?`)) return;
            try {
                await apiCall(`/categories/${id}`, { method: 'DELETE' });
                showToast('Categoría eliminada correctamente', 'success');
                await loadCategorias();
            } catch (error) {
                showToast(error.message || 'Error al eliminar categoría', 'error');
            }
        }
        
        async function initPage() {
            const session = await checkSession();
            if (!session || !session.authenticated) {
                window.location.href = '/';
                return;
            }
            const sessionData = getSessionStorage();
            document.getElementById('userName').textContent = sessionData.userName;
            document.getElementById('userRole').textContent = sessionData.userRol === 'admin' ? 'Administrador' : 'Empleado';
            document.getElementById('userAvatar').textContent = sessionData.userName.charAt(0).toUpperCase();
            if (sessionData.userRol !== 'admin') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            }
        }
        initPage();
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('es-DO');
        }
    </script>
    <script src="/js/license-banner.js"></script>
</body>
</html>
