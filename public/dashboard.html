<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .dash-welcome {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 2rem;
            color: white;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .dash-welcome h2 { margin: 0; font-size: 1.5rem; }
        .dash-welcome p { margin: 0.5rem 0 0; opacity: 0.85; }
        .dash-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .dash-action-btn {
            padding: 0.6rem 1rem;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            color: white;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .dash-action-btn:hover { background: rgba(255,255,255,0.3); }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .kpi-card {
            background: white;
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            position: relative;
            overflow: hidden;
        }
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
        }
        .kpi-card.ventas::before { background: #10b981; }
        .kpi-card.citas::before { background: #3b82f6; }
        .kpi-card.clientes::before { background: #8b5cf6; }
        .kpi-card.productos::before { background: #f59e0b; }
        .kpi-card.itbis::before { background: #ef4444; }
        .kpi-card.comisiones::before { background: #06b6d4; }
        .kpi-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .kpi-card.ventas .kpi-icon { background: #ecfdf5; }
        .kpi-card.citas .kpi-icon { background: #eff6ff; }
        .kpi-card.clientes .kpi-icon { background: #f5f3ff; }
        .kpi-card.productos .kpi-icon { background: #fffbeb; }
        .kpi-card.itbis .kpi-icon { background: #fef2f2; }
        .kpi-card.comisiones .kpi-icon { background: #ecfeff; }
        .kpi-valor { font-size: 1.75rem; font-weight: 800; color: var(--gray-900); font-variant-numeric: tabular-nums; }
        .kpi-label { font-size: 0.78rem; color: var(--gray-500); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 0.25rem; }
        .kpi-sub { font-size: 0.72rem; color: var(--gray-400); margin-top: 0.5rem; }
        .dash-sections { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; }
        @media (max-width: 1024px) { .dash-sections { grid-template-columns: 1fr; } }
        .dash-card { background: white; border-radius: 16px; padding: 1.25rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .dash-card h3 { margin: 0 0 1rem; font-size: 0.95rem; color: var(--gray-800); }
        .dash-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .dash-table th { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.68rem; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--gray-100); }
        .dash-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--gray-50); color: var(--gray-700); }
        .alerta-stock { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; background: #fef3c7; border-radius: 8px; margin-bottom: 0.35rem; font-size: 0.8rem; }
        .alerta-stock .stock-num { margin-left: auto; font-weight: 700; color: #dc2626; }
    </style>
</head>
<body>
    <div class="layout">
        <main class="main-content">
            <div class="dash-welcome">
                <div>
                    <h2 id="welcomeMsg">Buenos dias</h2>
                    <p id="negocioName">Cargando...</p>
                </div>
                <div class="dash-actions">
                    <a href="/pos" class="dash-action-btn">🛒 Facturar</a>
                    <a href="/citas" class="dash-action-btn">📅 Citas</a>
                    <a href="/clientes" class="dash-action-btn">👥 Clientes</a>
                    <a href="/reportes" class="dash-action-btn">📊 Reportes</a>
                </div>
            </div>

            <div class="kpi-grid" id="kpiGrid">
                <div class="kpi-card ventas">
                    <div class="kpi-icon">💰</div>
                    <div class="kpi-valor" id="kpiVentas">—</div>
                    <div class="kpi-label">Ventas Hoy</div>
                    <div class="kpi-sub" id="kpiVentasSub"></div>
                </div>
                <div class="kpi-card citas">
                    <div class="kpi-icon">📅</div>
                    <div class="kpi-valor" id="kpiCitas">—</div>
                    <div class="kpi-label">Citas Hoy</div>
                    <div class="kpi-sub" id="kpiCitasSub"></div>
                </div>
                <div class="kpi-card clientes">
                    <div class="kpi-icon">👥</div>
                    <div class="kpi-valor" id="kpiClientes">—</div>
                    <div class="kpi-label">Total Clientes</div>
                    <div class="kpi-sub" id="kpiClientesSub"></div>
                </div>
                <div class="kpi-card productos">
                    <div class="kpi-icon">📦</div>
                    <div class="kpi-valor" id="kpiProductos">—</div>
                    <div class="kpi-label">Productos</div>
                    <div class="kpi-sub" id="kpiProductosSub"></div>
                </div>
                <div class="kpi-card itbis">
                    <div class="kpi-icon">🏛️</div>
                    <div class="kpi-valor" id="kpiItbis">—</div>
                    <div class="kpi-label">ITBIS Neto DGII</div>
                    <div class="kpi-sub" id="kpiItbisSub"></div>
                </div>
                <div class="kpi-card comisiones">
                    <div class="kpi-icon">💼</div>
                    <div class="kpi-valor" id="kpiComisiones">—</div>
                    <div class="kpi-label">Comisiones Pendientes</div>
                    <div class="kpi-sub" id="kpiComisionesSub"></div>
                </div>
            </div>

            <div class="dash-sections">
                <div>
                    <div class="dash-card mb-4">
                        <h3>📈 Ultimas Ventas</h3>
                        <table class="dash-table">
                            <thead><tr><th>Cliente</th><th>Monto</th><th>Metodo</th><th>Fecha</th></tr></thead>
                            <tbody id="ultimasVentas"></tbody>
                        </table>
                    </div>
                    <div class="dash-card">
                        <h3>📅 Proximas Citas</h3>
                        <div id="proximasCitas"></div>
                    </div>
                </div>
                <div>
                    <div class="dash-card mb-4">
                        <h3>⚠️ Stock Bajo</h3>
                        <div id="alertasStock"></div>
                    </div>
                    <div class="dash-card">
                        <h3>📊 Resumen Mensual</h3>
                        <div id="resumenMensual"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await requireLicense(); if (!ok) return;
            const s = await checkSession(); if (!s || !s.authenticated) { window.location.href = '/'; return; }
            const hora = new Date().getHours();
            document.getElementById('welcomeMsg').textContent = (hora < 12 ? 'Buenos dias' : hora < 18 ? 'Buenas tardes' : 'Buenas noches') + ', ' + s.user.nombre;
            try {
                const [d, cfg] = await Promise.all([apiCall('/dashboard'), apiCall('/config').catch(() => null)]);
                if (cfg) document.getElementById('negocioName').textContent = cfg.nombre || 'Nexora';
                document.getElementById('kpiVentas').textContent = formatCurrency(d.ventasHoy);
                document.getElementById('kpiVentasSub').textContent = d.ventasHoyCount + ' transacciones';
                document.getElementById('kpiCitas').textContent = d.citasHoy;
                document.getElementById('kpiCitasSub').textContent = d.citasHoyPendientes + ' pendientes';
                document.getElementById('kpiClientes').textContent = d.totalClientes;
                document.getElementById('kpiClientesSub').textContent = d.clientesNuevosMes + ' nuevos este mes';
                document.getElementById('kpiProductos').textContent = d.totalProductos;
                document.getElementById('kpiProductosSub').textContent = d.stockBajo + ' con stock bajo';
                document.getElementById('kpiItbis').textContent = formatCurrency(d.itbisNeto);
                document.getElementById('kpiItbisSub').textContent = d.itbisNeto >= 0 ? 'A pagar a la DGII' : 'Credito fiscal a tu favor';
                document.getElementById('kpiComisiones').textContent = formatCurrency(d.comisionesPendientes);
                document.getElementById('kpiComisionesSub').textContent = d.comisionesCount + ' empleados';
                const uv = document.getElementById('ultimasVentas');
                if (d.ultimasVentas && d.ultimasVentas.length) {
                    uv.innerHTML = d.ultimasVentas.slice(0, 8).map(v => `<tr><td><strong>${esc(v.cliente || 'Consumidor final')}</strong></td><td style="font-weight:700;color:#10b981;">${formatCurrency(v.total)}</td><td>${v.metodo_pago}${v.banco ? ' / ' + esc(v.banco) : ''}</td><td style="color:var(--gray-400);font-size:0.75rem;">${fmtDate(v.fecha)}</td></tr>`).join('');
                } else { uv.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:1rem;color:var(--gray-400);">Sin ventas hoy</td></tr>'; }
                const pc = document.getElementById('proximasCitas');
                if (d.proximasCitas && d.proximasCitas.length) {
                    pc.innerHTML = d.proximasCitas.slice(0, 5).map(c => `<div style="display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0;border-bottom:1px solid var(--gray-50);"><span style="font-size:0.78rem;font-weight:600;color:var(--gray-700);">${c.hora_inicio}</span><span style="font-size:0.82rem;">${esc(c.cliente)}</span><span style="font-size:0.72rem;color:var(--gray-400);margin-left:auto;">${esc(c.servicio)}</span></div>`).join('');
                } else { pc.innerHTML = '<p style="text-align:center;padding:1rem;color:var(--gray-400);font-size:0.85rem;">Sin citas pendientes</p>'; }
                const as = document.getElementById('alertasStock');
                if (d.stockBajoList && d.stockBajoList.length) {
                    as.innerHTML = d.stockBajoList.slice(0, 8).map(p => `<div class="alerta-stock"><span>⚠️</span><span style="flex:1;">${esc(p.nombre)}</span><span class="stock-num">${p.stock}</span></div>`).join('');
                } else { as.innerHTML = '<p style="text-align:center;padding:1rem;color:var(--gray-400);font-size:0.85rem;">Todo el stock OK ✓</p>'; }
                const rm = document.getElementById('resumenMensual');
                rm.innerHTML = `<div style="display:flex;flex-direction:column;gap:0.75rem;">
                    <div style="display:flex;justify-content:space-between;"><span style="color:var(--gray-500);font-size:0.85rem;">Ventas del mes</span><span style="font-weight:700;color:#10b981;">${formatCurrency(d.ventasMes)}</span></div>
                    <div style="display:flex;justify-content:space-between;"><span style="color:var(--gray-500);font-size:0.85rem;">ITBIS cobrado</span><span style="font-weight:700;color:#8b5cf6;">${formatCurrency(d.itbisCobradoMes)}</span></div>
                    <div style="display:flex;justify-content:space-between;"><span style="color:var(--gray-500);font-size:0.85rem;">ITBIS pagado</span><span style="font-weight:700;color:#ef4444;">${formatCurrency(d.itbisPagadoMes)}</span></div>
                    <div style="display:flex;justify-content:space-between;padding-top:0.5rem;border-top:2px solid var(--gray-200);"><span style="font-weight:700;">Resultado del mes</span><span style="font-weight:800;font-size:1.1rem;color:${d.resultadoMes >= 0 ? '#10b981' : '#ef4444'};">${formatCurrency(d.resultadoMes)}</span></div>
                </div>`;
            } catch (e) { console.error('Error dashboard:', e); }
        });
        function esc(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function fmtDate(d) { if (!d) return ''; try { const p = d.replace('T',' ').split(/[- :]/); return new Date(p[0],p[1]-1,p[2]).toLocaleDateString('es-DO',{day:'2-digit',month:'short'}); } catch(e) { return d; } }
        function formatCurrency(a) { return 'RD$' + Number(a||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
    </script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/license-banner.js"></script>
</body>
</html>
