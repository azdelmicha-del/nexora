<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Nexora - Clientes</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="layout">
        <!-- Sidebar dinámico -->
        
        <main class="main-content">
            <div class="page-header">
                <h1>Gestión de Clientes</h1>
                <button class="btn btn-primary" onclick="openModal()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Nuevo Cliente
                </button>
            </div>

            <div class="card mb-4">
                <div class="card-body" style="display: flex; gap: 1rem; align-items: center;">
                    <input type="text" id="buscarCliente" placeholder="Buscar por nombre, teléfono o email..." 
                           style="flex: 1; padding: 0.75rem;" onkeyup="debouncedSearch()">
                    <select id="filtroEstado" style="padding: 0.75rem;" onchange="loadClientes()">
                        <option value="">Todos</option>
                        <option value="activo">Activos</option>
                        <option value="inactivo">Inactivos</option>
                    </select>
                </div>
            </div>
            
            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Teléfono</th>
                                <th>Documento</th>
                                <th>Ventas</th>
                                <th>Citas</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="clientesTable">
                            <tr><td colspan="7"><div class="spinner"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Nuevo Cliente</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="clienteForm">
                <div class="modal-body">
                    <input type="hidden" id="clienteId">
                    <div class="form-group">
                        <label for="nombre">Nombre *</label>
                        <input type="text" id="nombre" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="telefono">Celular *</label>
                            <input type="tel" id="telefono" placeholder="+1 (809) 555-1234" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="tipo_documento">Tipo de Documento</label>
                            <select id="tipo_documento">
                                <option value="">Sin documento</option>
                                <option value="rnc">RNC</option>
                                <option value="cedula">Cédula</option>
                                <option value="pasaporte">Pasaporte</option>
                                <option value="otro">Otro</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="documento">Documento</label>
                            <input type="text" id="documento" placeholder="RNC/Cédula/Pasaporte"
                                   title="Para emitir Crédito Fiscal (e-CF 31) se requiere RNC o Cédula">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="notas">Notas</label>
                        <textarea id="notas" rows="3" placeholder="Preferencias, condiciones, observaciones..."></textarea>
                    </div>
                    <div class="form-group" id="estadoGroup" style="display: none;">
                        <label for="estado">Estado</label>
                        <select id="estado">
                            <option value="activo">Activo</option>
                            <option value="inactivo">Inactivo</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="detalleOverlay">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <h3>Detalle del Cliente</h3>
                <button class="modal-close" onclick="closeDetalle()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="modal-body" id="detalleContent">
                <p>Cargando...</p>
            </div>
        </div>
    </div>
    
    <script src="/js/common.js"></script>
    <script src="/js/api.js"></script>
    <script>
        let editingId = null;
        let searchTimeout = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const licenseOk = await requireLicense();
            if (!licenseOk) return;
            
            const session = await checkSession();
            if (!session || !session.authenticated) {
                window.location.href = '/';
                return;
            }
            
            const status = await checkLicense();
            if (status.type === 'trial' && status.daysRemaining > 0) {
                showTrialBanner(status.daysRemaining);
            }
            
            await loadClientes();
            
            document.getElementById('clienteForm').addEventListener('submit', handleSubmit);
        });

        function debouncedSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadClientes, 300);
        }
        
        async function loadClientes() {
            const tbody = document.getElementById('clientesTable');
            tbody.innerHTML = getSkeletonHTML('table', 5);
            
            try {
                const buscar = document.getElementById('buscarCliente').value;
                const estado = document.getElementById('filtroEstado').value;
                
                let url = '/clients?';
                if (buscar) url += `buscar=${encodeURIComponent(buscar)}&`;
                if (estado) url += `estado=${estado}`;
                
                const clientes = await apiCall(url);
                
                if (clientes.length === 0) {
                    tbody.innerHTML = getEmptyStateHTML(
                        '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>',
                        'Sin clientes registrados',
                        'Agrega clientes para llevar un mejor control de tu negocio.',
                        'Agregar Cliente',
                        'openModal()'
                    ).replace('<div class="empty-state">', '<tr><td colspan="7"><div class="empty-state">').replace('</div>', '</div></td></tr>');
                    return;
                }
                
                tbody.innerHTML = clientes.map(c => {
                    const nombreEsc = (c.nombre || '').replace(/'/g, "\\'");
                    const docBadge = c.documento
                        ? `<span style="font-family:monospace;font-size:0.72rem;color:#1d4ed8;background:#eff6ff;padding:1px 6px;border-radius:10px;border:1px solid #bfdbfe;" title="Tipo: ${c.tipo_documento || 'N/A'}">${escapeHtml(c.documento)}</span>`
                        : '<span class="text-muted">—</span>';
                    return `
                    <tr class="fade-in">
                        <td><strong>${escapeHtml(c.nombre)}</strong></td>
                        <td>${escapeHtml(c.telefono || '<span class="text-muted">-</span>')}</td>
                        <td>${docBadge}</td>
                        <td>${c.total_ventas || 0}</td>
                        <td>${c.total_citas || 0}</td>
                        <td><span class="badge badge-${c.estado === 'activo' ? 'success' : 'danger'}">${c.estado}</span></td>
                        <td class="actions">
                            <button class="btn btn-secondary btn-sm" onclick="verDetalle(${c.id})">Ver</button>
                            <button class="btn btn-secondary btn-sm" onclick="editCliente(${c.id})">Editar</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteCliente(${c.id}, '${nombreEsc}')">Eliminar</button>
                        </td>
                    </tr>
                `}).join('');
            } catch (error) {
                tbody.innerHTML = getEmptyStateHTML(
                    '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>',
                    'Error al cargar clientes',
                    'No se pudieron cargar los clientes. Intenta de nuevo.'
                ).replace('<div class="empty-state">', '<tr><td colspan="7"><div class="empty-state">').replace('</div>', '</div></td></tr>');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function openModal(id = null) {
            editingId = id;
            document.getElementById('modalTitle').textContent = id ? 'Editar Cliente' : 'Nuevo Cliente';
            document.getElementById('estadoGroup').style.display = id ? 'block' : 'none';
            document.getElementById('clienteForm').reset();
            
            if (id) {
                loadCliente(id);
            }
            
            document.getElementById('modalOverlay').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            editingId = null;
        }

        async function verDetalle(id) {
            const content = document.getElementById('detalleContent');
            content.innerHTML = '<div class="spinner"></div>';
            
            try {
                const cliente = await apiCall(`/clients/${id}`);
                
                let html = `
                    <div style="margin-bottom: 1.5rem;">
                        <h4 style="color: var(--gray-900); margin-bottom: 0.5rem;">${escapeHtml(cliente.nombre)}</h4>
                        <p class="text-muted">${cliente.telefono || '-'}</p>
                        ${cliente.documento ? `<p style="margin-top:0.5rem;"><span style="font-family:monospace;font-size:0.82rem;color:#1d4ed8;background:#eff6ff;padding:2px 8px;border-radius:10px;border:1px solid #bfdbfe;">${escapeHtml(cliente.tipo_documento ? cliente.tipo_documento.toUpperCase() + ': ' : '')}${escapeHtml(cliente.documento)}</span></p>` : ''}
                        ${cliente.email ? `<p class="text-muted">${escapeHtml(cliente.email)}</p>` : ''}
                        ${cliente.notas ? `<p style="margin-top: 1rem; padding: 1rem; background: var(--gray-50); border-radius: 0.5rem;">${escapeHtml(cliente.notas)}</p>` : ''}
                    </div>
                    
                    <div class="tabs">
                        <button type="button" class="tab active" onclick="showDetalleTab('ventas', ${id})">Ventas</button>
                        <button type="button" class="tab" onclick="showDetalleTab('citas', ${id})">Citas</button>
                    </div>
                    
                    <div id="detalle-ventas">
                        ${cliente.ventas.length > 0 ? cliente.ventas.map(v => `
                            <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--gray-100);">
                                <div>
                                    <strong>${formatDate(v.fecha)}</strong>
                                    <span class="badge badge-${v.metodo_pago === 'efectivo' ? 'info' : 'warning'}">${v.metodo_pago}</span>
                                </div>
                                <strong class="text-success">${formatCurrency(v.total)}</strong>
                            </div>
                        `).join('') : '<p class="text-muted">No hay ventas registradas</p>'}
                    </div>
                    
                    <div id="detalle-citas" style="display: none;">
                        ${cliente.citas.length > 0 ? cliente.citas.map(c => `
                            <div style="display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--gray-100);">
                                <div>
                                    <strong>${c.servicio}</strong>
                                    <p class="text-muted">${formatDate(c.fecha)} ${c.hora_inicio}</p>
                                </div>
                                <span class="badge badge-${getEstadoColor(c.estado)}">${c.estado}</span>
                            </div>
                        `).join('') : '<p class="text-muted">No hay citas registradas</p>'}
                    </div>
                `;
                
                content.innerHTML = html;
                document.getElementById('detalleOverlay').classList.add('active');
            } catch (error) {
                content.innerHTML = `<p class="text-center text-danger">Error al cargar los datos</p>`;
                showToast(error.message, 'error');
            }
        }

        function showDetalleTab(tab, clienteId) {
            document.querySelectorAll('#detalleContent .tab').forEach(t => t.classList.remove('active'));
            document.getElementById('detalle-ventas').style.display = 'none';
            document.getElementById('detalle-citas').style.display = 'none';
            
            if (tab === 'ventas') {
                document.querySelector('#detalleContent .tab:nth-child(1)').classList.add('active');
                document.getElementById('detalle-ventas').style.display = 'block';
            } else {
                document.querySelector('#detalleContent .tab:nth-child(2)').classList.add('active');
                document.getElementById('detalle-citas').style.display = 'block';
            }
        }

        function closeDetalle() {
            document.getElementById('detalleOverlay').classList.remove('active');
        }
        
        async function loadCliente(id) {
            try {
                const cliente = await apiCall(`/clients/${id}`);
                document.getElementById('clienteId').value = cliente.id;
                document.getElementById('nombre').value = cliente.nombre;
                document.getElementById('telefono').value = cliente.telefono || '';
                document.getElementById('email').value = cliente.email || '';
                document.getElementById('tipo_documento').value = cliente.tipo_documento || '';
                document.getElementById('documento').value = cliente.documento || '';
                document.getElementById('notas').value = cliente.notas || '';
                document.getElementById('estado').value = cliente.estado;
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function editCliente(id) {
            openModal(id);
        }
        
        async function handleSubmit(e) {
            e.preventDefault();
            
            const nombreInput = document.getElementById('nombre');
            const telefonoInput = document.getElementById('telefono');
            const emailInput = document.getElementById('email');
            
            if (!validateField(nombreInput, validators.required)) return;
            
            const telefono = telefonoInput.value.trim();
            if (!telefono) {
                showToast('El celular es requerido', 'error');
                telefonoInput.classList.add('invalid');
                return;
            }
            
            const phoneRegex = /^[\+]?[\d\s\-\(\)]{10,20}$/;
            const digitsOnly = telefono.replace(/[\D]/g, '');
            if (digitsOnly.length < 10 || digitsOnly.length > 15) {
                showToast('El celular debe tener entre 10 y 15 dígitos', 'error');
                telefonoInput.classList.add('invalid');
                return;
            }
            
            if (!phoneRegex.test(telefono)) {
                showToast('Formato de celular inválido. Ejemplo: +1 (809) 555-1234', 'error');
                telefonoInput.classList.add('invalid');
                return;
            }
            
            if (emailInput.value.trim() && !validateField(emailInput, validators.email)) return;
            
            const data = {
                nombre: toTitleCase(nombreInput.value.trim()),
                telefono: telefono,
                email: emailInput.value.trim() || null,
                tipo_documento: document.getElementById('tipo_documento').value || null,
                documento: document.getElementById('documento').value.trim() || null,
                notas: capitalizeFirst(document.getElementById('notas').value) || null,
                estado: document.getElementById('estado').value
            };
            
            try {
                if (editingId) {
                    await apiCall(`/clients/${editingId}`, {
                        method: 'PUT',
                        body: JSON.stringify(data)
                    });
                    showToast('Cliente actualizado correctamente', 'success');
                } else {
                    await apiCall('/clients', {
                        method: 'POST',
                        body: JSON.stringify(data)
                    });
                    showToast('Cliente creado correctamente', 'success');
                }
                
                closeModal();
                await loadClientes();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function deleteCliente(id, nombre) {
            if (!confirm(`¿Está seguro que desea eliminar el cliente "${nombre}"?`)) return;
            try {
                await apiCall(`/clients/${id}`, { method: 'DELETE' });
                showToast('Cliente eliminado correctamente', 'success');
                await loadClientes();
            } catch (error) {
                showToast(error.message || 'Error al eliminar cliente', 'error');
            }
        }
        
    </script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/license-banner.js"></script>
</body>
</html>
