<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - Pedidos</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .estado-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--gray-300);
            border-radius: 9999px;
            background: white;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .estado-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .estado-btn.pendiente { border-color: #f59e0b; color: #b45309; }
        .estado-btn.pendiente.active { background: #f59e0b; color: #fff; }
        .estado-btn.confirmado { border-color: #3b82f6; color: #1d4ed8; }
        .estado-btn.confirmado.active { background: #3b82f6; color: #fff; }
        .estado-btn.preparando { border-color: #8b5cf6; color: #6d28d9; }
        .estado-btn.preparando.active { background: #8b5cf6; color: #fff; }
        .estado-btn.listo { border-color: #10b981; color: #047857; }
        .estado-btn.listo.active { background: #10b981; color: #fff; }
        .estado-btn.entregado { border-color: #6366f1; color: #4338ca; }
        .estado-btn.entregado.active { background: #6366f1; color: #fff; }
        .estado-btn.cancelado { border-color: #ef4444; color: #b91c1c; }
        .estado-btn.cancelado.active { background: #ef4444; color: #fff; }
        .pedidos-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 0.65rem;
            min-height: 38px;
        }
        .btn-limpiar-finalizados {
            border: 1px solid #fca5a5;
            background: #fff1f2;
            color: #b91c1c;
            border-radius: 999px;
            padding: 0.5rem 0.9rem;
            font-size: 0.78rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-limpiar-finalizados:hover { background: #ffe4e6; border-color: #f87171; }

        .pedidos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
            margin-top: 1.5rem;
            align-items: start;
        }

        .pedido-card {
            position: relative;
            background: radial-gradient(circle at top right, #f0fdf4, #ffffff 52%);
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid #dbe7f5;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }
        .pedido-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 34px rgba(15, 23, 42, 0.14);
            border-color: #b7d2f2;
        }
        .pedido-card::before {
            content: "";
            position: absolute;
            left: 0.8rem;
            right: 0.8rem;
            top: 0;
            height: 4px;
            border-radius: 0 0 999px 999px;
            background: #94a3b8;
        }
        .pedido-card.pendiente::before { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .pedido-card.confirmado::before { background: linear-gradient(90deg, #60a5fa, #2563eb); }
        .pedido-card.preparando::before { background: linear-gradient(90deg, #f59e0b, #ea580c); }
        .pedido-card.listo::before { background: linear-gradient(90deg, #34d399, #059669); }
        .pedido-card.entregado::before { background: linear-gradient(90deg, #38bdf8, #0284c7); }
        .pedido-card.cancelado { opacity: 0.8; }
        .pedido-card.cancelado::before { background: linear-gradient(90deg, #fca5a5, #ef4444); }

        .pc-header { display: flex; justify-content: space-between; align-items: center; gap: 0.75rem; }
        .pc-id { font-weight: 900; font-size: 1.25rem; color: #0f172a; letter-spacing: 0.01em; }
        .pc-time { font-size: 0.8rem; color: #475569; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .pc-cliente { font-weight: 800; font-size: 1.02rem; color: #0f172a; }
        .pc-items { font-size: 0.88rem; color: #334155; background: #f8fafc; padding: 0.75rem; border-radius: 12px; line-height: 1.45; }

        .pc-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #e2e8f0; padding-top: 0.8rem; margin-top: 0.1rem; }
        .pc-type { font-size: 0.72rem; padding: 5px 11px; border-radius: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; }
        .pc-type.domicilio { background: #dbeafe; color: #1d4ed8; }
        .pc-type.retiro { background: #ecfeff; color: #155e75; }
        .pc-total { font-weight: 900; color: #047857; font-size: 1.2rem; }
        .pc-facturado { font-size: 0.78rem; color: #166534; font-weight: 700; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 0.55rem 0.65rem; }

        .pc-actions { display: flex; gap: 0.5rem; margin-top: 0.2rem; }
        .pc-btn {
            flex: 1;
            padding: 0.62rem;
            border-radius: 999px;
            border: none;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
            text-align: center;
        }
        .pc-btn:hover { transform: translateY(-1px); }
        .pc-btn-primary { background: #2563eb; color: #fff; }
        .pc-btn-primary:hover { box-shadow: 0 8px 16px rgba(37, 99, 235, 0.28); }
        .pc-btn-success { background: #10b981; color: #fff; }
        .pc-btn-success:hover { box-shadow: 0 8px 16px rgba(16, 185, 129, 0.28); }
        .pc-btn-warning { background: #f59e0b; color: #fff; }
        .pc-btn-warning:hover { box-shadow: 0 8px 16px rgba(245, 158, 11, 0.28); }
        .pc-btn-view { background: #0f172a; color: #fff; }
        .pc-btn-view:hover { box-shadow: 0 8px 16px rgba(15, 23, 42, 0.25); }
        .pc-btn-invoice { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }
        .pc-btn-invoice:hover { box-shadow: 0 8px 16px rgba(16, 185, 129, 0.28); }
        .pc-btn-whatsapp { background: #22c55e; color: #fff; flex: 0 0 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 1.2rem; }
        .pc-btn-whatsapp:hover { box-shadow: 0 8px 16px rgba(34, 197, 94, 0.28); }

        .estado-badge { padding:3px 10px; border-radius:20px; font-size:0.68rem; font-weight:700; text-transform:uppercase; white-space:nowrap; }
        .estado-pendiente { background:#fef3c7; color:#92400e; }
        .estado-confirmado { background:#dbeafe; color:#1e40af; }
        .estado-preparando { background:#fef3c7; color:#92400e; }
        .estado-listo { background:#d1fae5; color:#065f46; }
        .estado-entregado { background:#ede9fe; color:#5b21b6; }
        .estado-cancelado { background:#fee2e2; color:#991b1b; }

        /* Modal premium */
        .modal-pedido-overlay {
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
            z-index:1000; display:flex; align-items:center; justify-content:center;
            opacity:0; visibility:hidden; transition:all 0.3s ease; padding:1rem;
        }
        .modal-pedido-overlay.active { opacity:1; visibility:visible; }
        .modal-pedido {
            background:white; border-radius:24px; max-width:480px; width:100%;
            max-height:90vh; overflow-y:auto; transform:scale(0.9) translateY(20px);
            transition:transform 0.3s ease; box-shadow:0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-pedido-overlay.active .modal-pedido { transform:scale(1) translateY(0); }

        .modal-pedido-header {
            background: linear-gradient(135deg, #0f172a 0%, #0ea5a0 100%);
            padding:1.5rem 1.5rem 1.25rem; border-radius:24px 24px 0 0;
            color:#fff; position:relative;
        }
        .modal-pedido-header h3 { font-size:1.25rem; font-weight:700; margin:0; }
        .modal-pedido-header p { font-size:0.82rem; opacity:0.85; margin:0.25rem 0 0; }
        .modal-pedido-close {
            position:absolute; top:12px; right:12px; width:32px; height:32px;
            border-radius:50%; background:rgba(255,255,255,0.2); border:none;
            color:#fff; font-size:18px; cursor:pointer; display:flex;
            align-items:center; justify-content:center; transition:all 0.2s;
        }
        .modal-pedido-close:hover { background:rgba(255,255,255,0.3); }

        .modal-pedido-body { padding:1.25rem 1.5rem; }
        .mp-row { display:flex; justify-content:space-between; padding:0.6rem 0; border-bottom:1px solid var(--gray-100); font-size:0.88rem; }
        .mp-row:last-child { border-bottom:none; }
        .mp-label { color:var(--gray-500); }
        .mp-value { font-weight:600; color:var(--gray-800); text-align:right; }
        .mp-value.green { color:#10b981; }
        .mp-value.purple { color:#8b5cf6; }

        .mp-items { background:var(--gray-50); border-radius:12px; padding:0.75rem 1rem; margin:0.75rem 0; }
        .mp-item { display:flex; justify-content:space-between; padding:0.35rem 0; font-size:0.85rem; }
        .mp-item-name { color:var(--gray-700); font-weight:600; }
        .mp-item-price { font-weight:700; }
        .mp-total { display:flex; justify-content:space-between; padding:0.75rem 0 0; border-top:2px solid var(--gray-200); margin-top:0.5rem; font-weight:800; font-size:1.15rem; }
        .mp-total .amount { color:#10b981; }

        .mp-notas { background:#fffbeb; border:1px solid #fde68a; border-radius:10px; padding:0.75rem; margin-top:0.75rem; font-size:0.85rem; color:var(--gray-700); }
        .mp-facturado { background:#f0fdf4; border:1px solid #a7f3d0; border-radius:10px; padding:0.75rem; margin-top:0.75rem; font-size:0.85rem; color:#065f46; font-weight:700; }

        .modal-pedido-actions {
            padding:1rem 1.5rem 1.5rem; display:flex; flex-wrap:wrap; gap:0.5rem;
        }
        .mp-btn {
            flex:1; min-width:120px; padding:0.75rem; border:none; border-radius:50px;
            font-size:0.85rem; font-weight:700; cursor:pointer; transition:all 0.2s;
            font-family:inherit; text-align:center;
        }
        .mp-btn:hover { transform:translateY(-1px); }
        .mp-btn-confirm { background:#3b82f6; color:#fff; }
        .mp-btn-confirm:hover { box-shadow:0 4px 12px rgba(59,130,246,0.4); }
        .mp-btn-prepare { background:#f59e0b; color:#fff; }
        .mp-btn-prepare:hover { box-shadow:0 4px 12px rgba(245,158,11,0.4); }
        .mp-btn-ready { background:#10b981; color:#fff; }
        .mp-btn-ready:hover { box-shadow:0 4px 12px rgba(16,185,129,0.4); }
        .mp-btn-deliver { background:#8b5cf6; color:#fff; }
        .mp-btn-deliver:hover { box-shadow:0 4px 12px rgba(139,92,246,0.4); }
        .mp-btn-cancel { background:#ef4444; color:#fff; }
        .mp-btn-cancel:hover { box-shadow:0 4px 12px rgba(239,68,68,0.4); }
        .mp-btn-invoice { background:linear-gradient(135deg,#10b981,#059669); color:#fff; }
        .mp-btn-invoice:hover { box-shadow:0 4px 12px rgba(16,185,129,0.4); }
        .mp-btn-close { background:var(--gray-100); color:var(--gray-600); }
        .mp-btn-close:hover { background:var(--gray-200); }

        .pedido-filtros { display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap; }

        @media (max-width: 1024px) {
            .pedidos-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
            .modal-pedido { max-width:100%; margin:0.5rem; border-radius:20px; }
            .modal-pedido-header { border-radius:20px 20px 0 0; }
        }

        @media (max-width: 768px) {
            .pedidos-grid { grid-template-columns: 1fr; gap: 1rem; }
            .mp-btn { min-width:100%; }
            .pc-actions { flex-wrap: wrap; }
            .pc-btn-whatsapp { flex: 1; border-radius: 999px; }
        }
    </style>
</head>
<body>
    <div class="layout">
        <main class="main-content">
            <div class="page-header">
                <h1>Pedidos</h1>
            </div>
            <div class="pedido-filtros" id="estadoTabs"></div>
            <div class="pedidos-actions" id="pedidosActions"></div>
            <div class="pedidos-grid" id="pedidosList"></div>
        </main>
    </div>

    <div class="modal-pedido-overlay" id="modalPedido" onclick="if(event.target===this)closeModalPedido()">
        <div class="modal-pedido">
            <div class="modal-pedido-header">
                <button class="modal-pedido-close" onclick="closeModalPedido()">&times;</button>
                <h3 id="mpTitle">Pedido</h3>
                <p id="mpSubtitle"></p>
            </div>
            <div class="modal-pedido-body" id="mpBody"></div>
            <div class="modal-pedido-actions" id="mpActions"></div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/html2canvas.min.js"></script>
    <script>
        let todosPedidos = [];
        const estados = [
            { key:'', label:'Todos', color:'#667eea' },
            { key:'pendiente', label:'Pendientes', color:'#f59e0b' },
            { key:'confirmado', label:'Confirmados', color:'#3b82f6' },
            { key:'preparando', label:'Preparando', color:'#f59e0b' },
            { key:'listo', label:'Listos', color:'#10b981' },
            { key:'entregado', label:'Entregados', color:'#8b5cf6' },
            { key:'cancelado', label:'Cancelados', color:'#ef4444' }
        ];
        let filtroActual = '';
        let negocioNombre = '';
        let negocioDireccion = '';
        let negocioTelefono = '';
        let negocioLogo = '';

        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await requireLicense(); if (!ok) return;
            const s = await checkSession(); if (!s || !s.authenticated) { window.location.href = '/'; return; }
            try {
                const config = await apiCall('/config');
                negocioNombre = config.nombre || '';
                negocioDireccion = config.direccion || '';
                negocioTelefono = config.telefono || '';
                negocioLogo = config.logo || '';
            } catch(e) {}
            renderTabs();
            await loadPedidos();
        });

        function renderTabs() {
            document.getElementById('estadoTabs').innerHTML = estados.map(e => {
                const count = e.key ? todosPedidos.filter(p => p.estado === e.key).length : todosPedidos.length;
                const activeCls = filtroActual === e.key ? 'active' : '';
                return `<button class="estado-btn ${e.key || 'todos'} ${activeCls}" onclick="setFiltro('${e.key}')">${e.label} (${count})</button>`;
            }).join('');

            renderActions();
        }

        function setFiltro(key) { filtroActual = key; renderTabs(); renderPedidos(); }

        function renderActions() {
            const actionsEl = document.getElementById('pedidosActions');
            if (!actionsEl) return;

            if (filtroActual === 'entregado' || filtroActual === 'cancelado') {
                const etiqueta = filtroActual === 'entregado' ? 'entregados' : 'cancelados';
                actionsEl.innerHTML = `<button class="btn-limpiar-finalizados" onclick="limpiarPedidosFinalizados('${filtroActual}', event)">Limpiar ${etiqueta}</button>`;
                return;
            }

            actionsEl.innerHTML = '';
        }

        async function loadPedidos() {
            try {
                todosPedidos = await apiCall('/pedidos');
                renderTabs();
                renderPedidos();
            } catch(e) {
                document.getElementById('pedidosList').innerHTML = '<p style="text-align:center;padding:2rem;color:#ef4444;">Error al cargar pedidos</p>';
            }
        }

        function renderPedidos() {
            const container = document.getElementById('pedidosList');
            const filtrados = filtroActual ? todosPedidos.filter(p => p.estado === filtroActual) : todosPedidos;

            if (!filtrados.length) {
                container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--gray-400);">No hay pedidos en este estado</div>';
                return;
            }

            container.innerHTML = filtrados.map(p => {
                const esDomicilio = p.tipo_entrega === 'domicilio';
                const itemsResumen = (p.items || []).map(i => `${i.cantidad}x ${i.nombre_item}`).join(', ');
                const horaCorta = fmtDate(p.fecha_creacion).split(',')[1] || '';

                return `
                    <article class="pedido-card ${p.estado}" onclick="openModalPedido(${p.id})">
                        <div class="pc-header">
                            <span class="pc-id">#${p.numero_pedido > 0 ? p.numero_pedido : p.id}</span>
                            <span class="estado-badge estado-${p.estado}">${p.estado}</span>
                        </div>
                        <div class="pc-time">🕒 ${horaCorta.trim() || 'Hora no disponible'}</div>
                        <div class="pc-cliente">${esc(p.cliente_nombre)}</div>
                        <div class="pc-items">${esc(itemsResumen || 'Sin detalles de productos')}</div>
                        <div class="pc-footer">
                            <span class="pc-type ${esDomicilio ? 'domicilio' : 'retiro'}">${esDomicilio ? '🚗 Delivery' : '🛍️ Retiro'}</span>
                            <span class="pc-total">${formatCurrency(p.total)}</span>
                        </div>
                        ${p.venta_id ? `<div class="pc-facturado">✅ Facturado: ${esc(p.venta_ecf || 'E-CF')}</div>` : ''}
                        <div class="pc-actions" onclick="event.stopPropagation()">
                            <button class="pc-btn pc-btn-view" onclick="openModalPedido(${p.id})">Ver pedido</button>
                            <button class="pc-btn pc-btn-whatsapp" onclick="enviarNotificacionWhatsApp(${p.id}, '${p.estado}')" title="Avisar por WhatsApp">
                                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                            </button>
                        </div>
                    </article>
                `;
            }).join('');
        }

        function openModalPedido(id) {
            const p = todosPedidos.find(x => x.id === id);
            if (!p) return;

            document.getElementById('mpTitle').textContent = 'Pedido #' + (p.numero_pedido > 0 ? p.numero_pedido : p.id);
            document.getElementById('mpSubtitle').textContent = fmtDate(p.fecha_creacion);

            let bodyHtml = `
                <div class="mp-row"><span class="mp-label">Cliente</span><span class="mp-value">${esc(p.cliente_nombre)}</span></div>
                <div class="mp-row"><span class="mp-label">Telefono</span><span class="mp-value">${esc(p.cliente_telefono || '—')}</span></div>
                <div class="mp-row"><span class="mp-label">Entrega</span><span class="mp-value">${p.tipo_entrega === 'domicilio' ? 'Domicilio' : 'Retiro en local'}</span></div>
                <div class="mp-row"><span class="mp-label">Estado</span><span class="mp-value"><span class="estado-badge estado-${p.estado}">${p.estado}</span></span></div>
            `;
            if (p.cliente_direccion) {
                bodyHtml += `<div class="mp-row"><span class="mp-label">Direccion</span><span class="mp-value">${esc(p.cliente_direccion)}</span></div>`;
            }
            if (p.cliente_ubicacion) {
                bodyHtml += `<div class="mp-row"><span class="mp-label">Ubicacion</span><span class="mp-value"><a href="https://maps.google.com/?q=${esc(p.cliente_ubicacion)}" target="_blank" style="color:#3b82f6;">Ver mapa</a></span></div>`;
            }

            bodyHtml += '<div class="mp-items">';
            (p.items||[]).forEach(i => {
                bodyHtml += `<div class="mp-item"><span class="mp-item-name">${esc(i.nombre_item)} x${i.cantidad}</span><span class="mp-item-price">${formatCurrency(i.subtotal)}</span></div>`;
            });
            if (p.costo_envio > 0) {
                bodyHtml += `<div class="mp-item" style="color:var(--gray-500);"><span>Envio</span><span>${formatCurrency(p.costo_envio)}</span></div>`;
            }
            bodyHtml += `<div class="mp-total"><span>Total</span><span class="amount">${formatCurrency(p.total)}</span></div>`;
            bodyHtml += '</div>';

            if (p.notas) {
                bodyHtml += `<div class="mp-notas">📝 ${esc(p.notas)}</div>`;
            }
            if (p.venta_ecf) {
                bodyHtml += `<div class="mp-facturado">✅ Facturado: ${esc(p.venta_ecf)}</div>`;
            }

            document.getElementById('mpBody').innerHTML = bodyHtml;

            // Action buttons siempre visibles
            let actionsHtml = '';
            actionsHtml += `<button class="mp-btn mp-btn-confirm" onclick="cambiarEstado(${p.id},'confirmado')">Confirmar</button>`;
            actionsHtml += `<button class="mp-btn mp-btn-prepare" onclick="cambiarEstado(${p.id},'preparando')">Preparar</button>`;
            actionsHtml += `<button class="mp-btn mp-btn-ready" onclick="cambiarEstado(${p.id},'listo')">Listo</button>`;

        function enviarNotificacionWhatsApp(pedidoId, estado) {
            const p = todosPedidos.find(x => x.id === pedidoId);
            if (!p || !p.cliente_telefono) return;

            const tel = p.cliente_telefono.replace(/\D/g, '');
            if (tel.length < 10) return;

            const itemsList = (p.items||[]).map(i => '- ' + i.nombre_item + ' x' + i.cantidad).join('\n');
            let msg = '';
            const numPedido = p.numero_pedido > 0 ? p.numero_pedido : p.id;
            if (estado === 'confirmado') {
                msg = '*PEDIDO CONFIRMADO*\n\nHola ' + p.cliente_nombre + ', tu pedido #' + numPedido + ' ha sido confirmado.\n\n*Items:*\n' + (p.items||[]).map(i => '- ' + i.nombre_item + ' x' + i.cantidad).join('\n') + '\n\n*Total: ' + formatCurrency(p.total) + '*\n\nTe avisaremos cuando este listo.';

                msg = '*PEDIDO EN PREPARACION*\n\nHola ' + p.cliente_nombre + ', tu pedido #' + numPedido + ' esta siendo preparado.\n\n*Total: ' + formatCurrency(p.total) + '*\n\nPronto estara listo.';
            } else if (estado === 'listo') {
                msg = '*PEDIDO LISTO!*\n\nHola ' + p.cliente_nombre + ', tu pedido #' + numPedido + ' esta listo para ' + (p.tipo_entrega === 'domicilio' ? 'entrega' : 'retiro') + '.\n\n*Total: ' + formatCurrency(p.total) + '*';

        async function enviarReciboWhatsApp(cliente, ncf, total) {
            const reciboEl = document.getElementById('reciboContent');
            if (!reciboEl) return;

            const p = todosPedidos.find(x => x.cliente_nombre === cliente);
            const tel = p ? (p.cliente_telefono || '').replace(/\D/g, '') : '';

            if (!tel) {
                showToast('El cliente no tiene telefono registrado', 'error');
                return;
            }

            try {
                // Capturar el recibo como imagen con html2canvas
                const canvas = await html2canvas(reciboEl, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    useCORS: true,
                    logging: false
                });

                // Convertir a blob
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                const fileName = 'factura_' + ncf + '.png';

                // Intentar Web Share API (movil)
                if (navigator.share && navigator.canShare) {
                    const file = new File([blob], fileName, { type: 'image/png' });
                    const shareData = { files: [file] };
                    if (navigator.canShare({ files: [file] })) {
                        await navigator.share(shareData);
                        showToast('Factura compartida!', 'success');
                        return;
                    }
                }

                // Fallback PC: descargar + abrir WhatsApp
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                if (navigator.clipboard && window.ClipboardItem) {
                    navigator.clipboard.write([
                        new ClipboardItem({ 'image/png': blob })
                    ]).then(() => {
                        showToast('Imagen copiada. Pégala en WhatsApp (Ctrl+V)', 'info');
                    }).catch(() => {});
                }

                // Abrir WhatsApp con el numero del cliente
                const waUrl = 'https://wa.me/1' + tel;
                window.open(waUrl, '_blank');

                showToast('Imagen descargada. Adjuntala en el chat de WhatsApp.', 'success');
            } catch(e) {
                console.error('Error:', e);
                showToast('Error al generar imagen', 'error');
            }
        }

        function esc(t){if(!t)return'';const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
        function fmtDate(d){if(!d)return'';try{const parts=d.split(/[- :]/);const h=parseInt(parts[3]||0);const m=parseInt(parts[4]||0);const dt=new Date(parts[0],parts[1]-1,parts[2],h,m);const ampm=h>=12?'p. m.':'a. m.';const h12=h%12||12;return dt.toLocaleDateString('es-DO',{day:'2-digit',month:'short'})+', '+String(h12).padStart(2,'0')+':'+String(m).padStart(2,'0')+' '+ampm;}catch(e){return d;}}
        function formatCurrency(a){return'RD$'+Number(a||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
