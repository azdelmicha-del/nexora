<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Nexora</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
        
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .login-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        
        .login-subtitle {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #333;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        /* Dashboard */
        .dashboard {
            display: none;
        }
        
        .dashboard.active {
            display: block;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 700;
        }
        
        .header-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .table th,
        .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .table th {
            background: #f8f9fa;
            font-weight: 600;
            font-size: 14px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-activo {
            background: #d1fae5;
            color: #059669;
        }
        
        .badge-suspendido {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .badge-trial {
            background: #fef3c7;
            color: #d97706;
        }
        
        .badge-premium {
            background: #dbeafe;
            color: #2563eb;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            margin: 2px;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-warning {
            background: #f59e0b;
            color: white;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-info {
            background: #3b82f6;
            color: white;
        }
        
        .actions {
            display: flex;
            gap: 4px;
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div class="login-container" id="login-container">
        <div class="login-card">
            <h1 class="login-title">Super Admin</h1>
            <p class="login-subtitle">Panel de administración de Nexora</p>
            <div class="error-msg" id="login-error"></div>
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="login-email" required placeholder="Email">
                </div>
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-input" id="login-password" required placeholder="Contraseña">
                </div>
                <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
            </form>
        </div>
    </div>
    
    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="header">
            <div class="header-title">Super Admin - Nexora</div>
            <div class="header-user">
                <span id="admin-name">Admin</span>
                <button class="logout-btn" onclick="logout()">Salir</button>
            </div>
        </div>
        
        <div class="container">
            <!-- Stats -->
            <div class="stats-grid" id="stats-grid"></div>
            
            <!-- Negocios -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Negocios</h2>
                </div>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Estado</th>
                                <th>Licencia</th>
                                <th>Usuarios</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="negocios-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let sessionChecked = false;
        
        document.addEventListener('DOMContentLoaded', () => {
            checkSession();
            document.getElementById('login-form').addEventListener('submit', handleLogin);
        });
        
        async function checkSession() {
            try {
                const res = await fetch('/api/superadmin/session');
                const data = await res.json();
                
                if (data.authenticated) {
                    showDashboard(data.admin);
                } else {
                    showLogin();
                }
            } catch (error) {
                showLogin();
            }
            sessionChecked = true;
        }
        
        function showLogin() {
            document.getElementById('login-container').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
        }
        
        function showDashboard(admin) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            document.getElementById('admin-name').textContent = admin.nombre;
            loadStats();
            loadNegocios();
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            
            try {
                const res = await fetch('/api/superadmin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    errorEl.textContent = data.error;
                    errorEl.classList.add('show');
                    return;
                }
                
                errorEl.classList.remove('show');
                showDashboard(data.admin);
            } catch (error) {
                errorEl.textContent = 'Error de conexión';
                errorEl.classList.add('show');
            }
        }
        
        async function loadStats() {
            try {
                const res = await fetch('/api/superadmin/stats');
                const stats = await res.json();
                
                document.getElementById('stats-grid').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalNegocios}</div>
                        <div class="stat-label">Total Negocios</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.negociosActivos}</div>
                        <div class="stat-label">Negocios Activos</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.negociosSuspendidos}</div>
                        <div class="stat-label">Suspendidos</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalUsuarios}</div>
                        <div class="stat-label">Total Usuarios</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalCitas}</div>
                        <div class="stat-label">Total Citas</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.totalVentas}</div>
                        <div class="stat-label">Total Ventas</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        async function loadNegocios() {
            try {
                const res = await fetch('/api/superadmin/negocios');
                const negocios = await res.json();
                
                const tbody = document.getElementById('negocios-table');
                tbody.innerHTML = negocios.map(n => `
                    <tr>
                        <td>${n.id}</td>
                        <td>${n.nombre}</td>
                        <td>${n.email || '-'}</td>
                        <td><span class="badge badge-${n.estado}">${n.estado}</span></td>
                        <td><span class="badge badge-${n.licencia_plan}">${n.licencia_plan || 'trial'}</span></td>
                        <td>${n.total_usuarios}</td>
                        <td class="actions">
                            ${n.estado === 'activo' ? 
                                `<button class="btn-sm btn-warning" onclick="cambiarEstado(${n.id}, 'suspendido')">Suspender</button>` :
                                `<button class="btn-sm btn-success" onclick="cambiarEstado(${n.id}, 'activo')">Activar</button>`
                            }
                            <button class="btn-sm btn-info" onclick="verDetalle(${n.id})">Ver</button>
                            <button class="btn-sm btn-danger" onclick="eliminarNegocio(${n.id})">Eliminar</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading negocios:', error);
            }
        }
        
        async function cambiarEstado(id, estado) {
            if (!confirm(`¿Estás seguro de ${estado === 'activo' ? 'activar' : 'suspender'} este negocio?`)) return;
            
            try {
                await fetch(`/api/superadmin/negocios/${id}/estado`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estado })
                });
                loadNegocios();
                loadStats();
            } catch (error) {
                alert('Error al cambiar estado');
            }
        }
        
        async function eliminarNegocio(id) {
            if (!confirm('¿Estás seguro de eliminar este negocio? Esta acción no se puede deshacer.')) return;
            
            try {
                await fetch(`/api/superadmin/negocios/${id}`, { method: 'DELETE' });
                loadNegocios();
                loadStats();
            } catch (error) {
                alert('Error al eliminar negocio');
            }
        }
        
        function verDetalle(id) {
            window.open(`/api/superadmin/negocios/${id}`, '_blank');
        }
        
        async function logout() {
            try {
                await fetch('/api/superadmin/logout', { method: 'POST' });
                showLogin();
            } catch (error) {
                console.error('Error logout:', error);
            }
        }
    </script>
</body>
</html>
