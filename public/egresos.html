<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egresos - Nexora</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); }
        .layout { display: flex; min-height: 100vh; }
        .main-content { flex: 1; padding: 2rem; margin-left: 260px; }
        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 1.75rem; font-weight: 700; color: var(--gray-800); margin-bottom: 0.5rem; }
        .resumen-hero { display: grid; grid-template-columns: 1fr 1fr; gap: 0; padding: 0; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 1.5rem; }
        .resumen-hero > div { padding: 1.5rem 2rem; background: white; }
        .resumen-hero > div:first-child { border-right: 1px solid var(--gray-100); }
        .text-muted { color: var(--gray-500); }
        .total-grande { font-size: 2rem; font-weight: 700; }
        .total-grande.costo { color: #f59e0b; }
        .total-grande.gasto { color: #ef4444; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
        .filtros-fecha { display: flex; gap: 0.5rem; }
        .btn-filtro { padding: 0.5rem 1rem; border: 1px solid var(--gray-200); background: white; border-radius: 8px; cursor: pointer; font-size: 0.875rem; transition: all 0.2s; }
        .btn-filtro:hover { background: var(--gray-50); }
        .btn-filtro.activo { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-nuevo { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.25rem; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 16px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--gray-200); }
        .modal-header h3 { font-size: 1.1rem; font-weight: 600; }
        .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--gray-400); }
        .modal-body { padding: 1.5rem; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; padding: 1rem 1.5rem; border-top: 1px solid var(--gray-200); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 500; color: var(--gray-700); margin-bottom: 0.375rem; }
        .form-input, .form-select { width: 100%; padding: 0.625rem; border: 1px solid var(--gray-300); border-radius: 8px; font-size: 0.9rem; }
        .form-input:focus, .form-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .btn { padding: 0.625rem 1.25rem; border-radius: 8px; font-weight: 500; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
        .btn-secondary { background: var(--gray-100); color: var(--gray-700); border: none; }
        .btn-secondary:hover { background: var(--gray-200); }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: var(--primary-dark); }
        @media (max-width: 768px) {
            .main-content { margin-left: 0; padding: 1rem; }
            .resumen-hero { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    
    <div class="layout">
        <main class="main-content">
            <div class="page-header">
                <h1>Egresos</h1>
                <p class="text-muted">Registra costos y gastos del negocio</p>
            </div>
            
            <div class="resumen-hero">
                <div style="background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 50%, #fde68a 100%); border-left: 5px solid #f59e0b;">
                    <div style="font-size: 0.75rem; color: #b45309; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; font-weight: 600;">📦 Total Costos</div>
                    <div><span class="total-grande costo" id="heroCostos">RD$0.00</span></div>
                    <span style="font-size: 0.85rem; color: #92400e;"><span id="heroCountCostos">0</span> registros</span>
                </div>
                <div style="background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 50%, #fecaca 100%); border-left: 5px solid #ef4444;">
                    <div style="font-size: 0.75rem; color: #b91c1c; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; font-weight: 600;">💸 Total Gastos</div>
                    <div><span class="total-grande gasto" id="heroGastos">RD$0.00</span></div>
                    <span style="font-size: 0.85rem; color: #991b1b;"><span id="heroCountGastos">0</span> registros</span>
                </div>
            </div>
            
            <div class="toolbar">
                <div class="filtros-fecha">
                    <input type="hidden" id="fechaDesde">
                    <input type="hidden" id="fechaHasta">
                    <button class="btn-filtro" id="btnTurnoActual" onclick="setFiltro('turno', this)" style="background: #10b981; color: white; border-color: #10b981;">🟢 Turno Actual</button>
                    <button class="btn-filtro" onclick="setFiltro('hoy', this)">Hoy</button>
                    <button class="btn-filtro activo" onclick="setFiltro('mes', this)">Este mes</button>
                    <button class="btn-filtro" onclick="setFiltro('mesAnterior', this)">Mes anterior</button>
                </div>
            </div>
            
            <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
                <button class="btn-filtro activo" id="btnCatTodos" onclick="filtrarCategoria('todos', this)" style="background: #667eea; color: white;">📋 Todos</button>
                <button class="btn-filtro" id="btnCatCostoVentas" onclick="filtrarCategoria('costo_ventas', this)" style="background: #f59e0b; color: white;">📦 Costo de Ventas</button>
                <button class="btn-filtro" id="btnCatGastosOp" onclick="filtrarCategoria('gastos_operativos', this)" style="background: #8b5cf6; color: white;">🏢 Gastos Fijos</button>
                <button class="btn-filtro" id="btnCatGastosPers" onclick="filtrarCategoria('gastos_personales', this)" style="background: #ef4444; color: white;">💸 Gastos Personales</button>
                <button class="btn-filtro" id="btnCatOtros" onclick="filtrarCategoria('otros_gastos', this)" style="background: #6b7280; color: white;">📋 Otros Costos</button>
            </div>
            
            <div style="text-align: right; margin-bottom: 1rem;">
                <button class="btn-nuevo" id="btnNuevo" onclick="abrirModal()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Nuevo Registro
                </button>
            </div>
            
            <div id="seccionesContainer"></div>
        </main>
    </div>
    
    <div class="modal-overlay" id="modalItem">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitulo">Nuevo Registro</h3>
                <button class="modal-close" onclick="cerrarModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="formItem">
                    <input type="hidden" id="itemId">
                    <div class="form-group">
                        <label>Categoría *</label>
                        <select id="itemCategoria" class="form-select" onchange="actualizarSubtipo()"></select>
                    </div>
                    <div class="form-group">
                        <label>Descripción *</label>
                        <input type="text" id="itemDescripcion" class="form-input" placeholder="Ej: Compra de productos">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Subtotal (RD$)</label>
                            <input type="number" id="itemSubtotal" class="form-input" step="0.01" min="0" placeholder="0.00" oninput="calcularTotal()">
                        </div>
                        <div class="form-group">
                            <label>Descuento</label>
                            <input type="number" id="itemDescuento" class="form-input" step="0.01" min="0" placeholder="0.00" value="0" oninput="calcularTotal()">
                        </div>
                        <div class="form-group">
                            <label>ITBIS 18%</label>
                            <input type="number" id="itemItbis" class="form-input" step="0.01" min="0" placeholder="0.00" oninput="calcularTotal()">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Total (RD$) *</label>
                        <input type="number" id="itemMonto" class="form-input" step="0.01" min="0" placeholder="0.00" readonly style="font-weight: 700; font-size: 1.1rem; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); border: 2px solid #f59e0b; color: #92400e;">
                    </div>
                    <div class="form-group">
                        <label>Fecha *</label>
                        <input type="date" id="itemFecha" class="form-input">
                    </div>
                    <div class="form-group">
                        <label>Método de Pago *</label>
                        <select id="itemMetodoPago" class="form-select">
                            <option value="efectivo">💵 Efectivo</option>
                            <option value="transferencia">🏦 Transferencia</option>
                            <option value="tarjeta">💳 Tarjeta</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Notas</label>
                        <textarea id="itemNotas" class="form-input" rows="2" placeholder="Notas adicionales"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="guardarItem()">Guardar</button>
            </div>
        </div>
    </div>
    
    <script src="/js/api.js"></script>
    <script src="/js/sidebar.js"></script>
    <script>
        let datosActuales = null;
        let editandoId = null;
        let categoriaFiltro = 'todos';
        let filtroTurno = false;
        
        function filtrarCategoria(categoria, btn) {
            categoriaFiltro = categoria;
            document.querySelectorAll('[id^="btnCat"]').forEach(b => {
                b.classList.remove('activo');
                b.style.opacity = '0.7';
            });
            btn.classList.add('activo');
            btn.style.opacity = '1';
            
            if (datosActuales) {
                renderSeccionesFiltradas();
            }
        }
        
        function renderSeccionesFiltradas() {
            const todos = datosActuales.items.filter(i => i.tipo === 'gasto');
            
            if (categoriaFiltro === 'todos') {
                renderListaTodos(todos);
                return;
            }
            
            let itemsFiltrados = todos;
            let titulo = '📋 Todos los Egresos';
            let color = '#667eea';
            
            if (categoriaFiltro === 'costo_ventas') {
                itemsFiltrados = todos.filter(i => i.categoria === 'costo_ventas');
                titulo = '📦 Costo de Ventas';
                color = '#f59e0b';
            } else if (categoriaFiltro === 'gastos_operativos') {
                itemsFiltrados = todos.filter(i => i.categoria === 'gastos_operativos');
                titulo = '🏢 Gastos Fijos';
                color = '#8b5cf6';
            } else if (categoriaFiltro === 'gastos_personales') {
                itemsFiltrados = todos.filter(i => i.categoria === 'gastos_personales');
                titulo = '💸 Gastos Personales';
                color = '#ef4444';
            } else if (categoriaFiltro === 'otros_gastos') {
                itemsFiltrados = todos.filter(i => i.categoria === 'otros_gastos');
                titulo = '📋 Otros Costos';
                color = '#6b7280';
            }
            
            renderListaUnica(itemsFiltrados, titulo, color);
        }
        
        function renderListaTodos(items) {
            const container = document.getElementById('seccionesContainer');
            const total = items.reduce((s, i) => s + i.monto, 0);
            
            const costoVentas = items.filter(i => i.categoria === 'costo_ventas');
            const gastosFijos = items.filter(i => i.categoria === 'gastos_operativos');
            const gastosPers = items.filter(i => i.categoria === 'gastos_personales');
            const otrosCostos = items.filter(i => i.categoria === 'otros_gastos');
            
            const totCostoVentas = costoVentas.reduce((s, i) => s + i.monto, 0);
            const totGastosFijos = gastosFijos.reduce((s, i) => s + i.monto, 0);
            const totGastosPers = gastosPers.reduce((s, i) => s + i.monto, 0);
            const totOtrosCostos = otrosCostos.reduce((s, i) => s + i.monto, 0);
            
            let html = `
                <div style="background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 1.5rem;">
                    <div style="background: linear-gradient(135deg, #667eea20 0%, #667eea10 100%); padding: 1.25rem 1.5rem; border-bottom: 1px solid #667eea30; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <h3 style="margin: 0; font-size: 1.2rem; color: #667eea; font-weight: 700;">📋 Resumen de Egresos</h3>
                            <span style="font-size: 0.8rem; color: #6b7280;">${items.length} registro${items.length !== 1 ? 's' : ''}</span>
                        </div>
                        <div style="text-align: right;">
                            <span style="font-size: 0.75rem; color: #667eea; text-transform: uppercase; letter-spacing: 1px;">Total General</span>
                            <div style="font-size: 1.75rem; font-weight: 700; color: #667eea;">${formatCurrency(total)}</div>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1.5rem;">
                        <div style="background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); border: 1px solid #fde68a; border-left: 4px solid #f59e0b; border-radius: 12px; padding: 1.25rem; text-align: center;">
                            <div style="font-size: 0.75rem; color: #b45309; font-weight: 600;">📦 Costo de Ventas</div>
                            <div style="font-size: 1.5rem; font-weight: 700; color: #92400e; margin: 0.5rem 0;">${formatCurrency(totCostoVentas)}</div>
                            <div style="font-size: 0.7rem; color: #b45309; background: #fef3c7; padding: 3px 10px; border-radius: 10px; display: inline-block; font-weight: 600;">${costoVentas.length} reg.</div>
                        </div>
                        <div style="background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); border: 1px solid #ddd6fe; border-left: 4px solid #8b5cf6; border-radius: 12px; padding: 1.25rem; text-align: center;">
                            <div style="font-size: 0.75rem; color: #6d28d9; font-weight: 600;">🏢 Gastos Fijos</div>
                            <div style="font-size: 1.5rem; font-weight: 700; color: #5b21b6; margin: 0.5rem 0;">${formatCurrency(totGastosFijos)}</div>
                            <div style="font-size: 0.7rem; color: #6d28d9; background: #ede9fe; padding: 3px 10px; border-radius: 10px; display: inline-block; font-weight: 600;">${gastosFijos.length} reg.</div>
                        </div>
                        <div style="background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%); border: 1px solid #fecaca; border-left: 4px solid #ef4444; border-radius: 12px; padding: 1.25rem; text-align: center;">
                            <div style="font-size: 0.75rem; color: #b91c1c; font-weight: 600;">💸 Gastos Personales</div>
                            <div style="font-size: 1.5rem; font-weight: 700; color: #991b1b; margin: 0.5rem 0;">${formatCurrency(totGastosPers)}</div>
                            <div style="font-size: 0.7rem; color: #b91c1c; background: #fee2e2; padding: 3px 10px; border-radius: 10px; display: inline-block; font-weight: 600;">${gastosPers.length} reg.</div>
                        </div>
                        <div style="background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%); border: 1px solid #e5e7eb; border-left: 4px solid #6b7280; border-radius: 12px; padding: 1.25rem; text-align: center;">
                            <div style="font-size: 0.75rem; color: #4b5563; font-weight: 600;">📋 Otros Costos</div>
                            <div style="font-size: 1.5rem; font-weight: 700; color: #374151; margin: 0.5rem 0;">${formatCurrency(totOtrosCostos)}</div>
                            <div style="font-size: 0.7rem; color: #4b5563; background: #f3f4f6; padding: 3px 10px; border-radius: 10px; display: inline-block; font-weight: 600;">${otrosCostos.length} reg.</div>
                        </div>
                    </div>
                </div>
                
                <div style="background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
                    <div style="padding: 1.25rem 1.5rem; border-bottom: 1px solid #e5e7eb;">
                        <h3 style="margin: 0; font-size: 1.1rem; color: #1f2937; font-weight: 600;">📋 Detalle de Egresos</h3>
                    </div>
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                                <th style="padding: 14px 16px; text-align: left; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Fecha</th>
                                <th style="padding: 14px 16px; text-align: left; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Hora</th>
                                <th style="padding: 14px 16px; text-align: left; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Categoría</th>
                                <th style="padding: 14px 16px; text-align: left; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Descripción</th>
                                <th style="padding: 14px 16px; text-align: left; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Pago</th>
                                <th style="padding: 14px 16px; text-align: right; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Subtotal</th>
                                <th style="padding: 14px 16px; text-align: right; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Desc.</th>
                                <th style="padding: 14px 16px; text-align: right; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">ITBIS</th>
                                <th style="padding: 14px 16px; text-align: right; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Total</th>
                                <th style="padding: 14px 16px; text-align: center; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Acción</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            if (items.length === 0) {
                html += '<tr><td colspan="10" style="padding: 3rem; text-align: center; color: #6b7280;">Sin registros</td></tr>';
            } else {
                const itemsOrdenados = [...items].sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
                
                itemsOrdenados.forEach(item => {
                    const colorCat = item.categoria === 'costo_ventas' ? '#f59e0b' : item.categoria === 'gastos_operativos' ? '#8b5cf6' : item.categoria === 'gastos_personales' ? '#ef4444' : '#6b7280';
                    const labelCat = item.categoria === 'costo_ventas' ? '📦 C. Ventas' : item.categoria === 'gastos_operativos' ? '🏢 G. Fijos' : item.categoria === 'gastos_personales' ? '💸 G. Pers.' : '📋 Otros';
                    const mp = item.metodo_pago || 'efectivo';
                    const colorPago = mp === 'efectivo' ? '#10b981' : mp === 'tarjeta' ? '#f59e0b' : '#3b82f6';
                    const labelPago = mp === 'efectivo' ? '💵 Efectivo' : mp === 'tarjeta' ? '💳 Tarjeta' : '🏦 Transf.';
                    
                    html += `
                        <tr style="border-bottom: 1px solid #f3f4f6;">
                            <td style="padding: 14px 16px; font-size: 0.85rem; color: #6b7280; white-space: nowrap;">${formatDate(item.fecha)}</td>
                            <td style="padding: 14px 16px; font-size: 0.8rem; color: #9ca3af; white-space: nowrap;">${item.hora ? item.hora.substring(0, 5) : '-'}</td>
                            <td style="padding: 14px 16px;">
                                <span style="font-size: 0.75rem; font-weight: 600; color: ${colorCat}; background: ${colorCat}15; padding: 3px 10px; border-radius: 12px;">${labelCat}</span>
                            </td>
                            <td style="padding: 14px 16px; font-weight: 500; color: #1f2937; font-size: 0.9rem;">${escapeHtml(item.descripcion)}</td>
                            <td style="padding: 14px 16px;">
                                <span style="font-size: 0.7rem; font-weight: 600; color: ${colorPago}; background: ${colorPago}15; padding: 3px 8px; border-radius: 10px;">${labelPago}</span>
                            </td>
                            <td style="padding: 14px 16px; text-align: right; font-size: 0.85rem; color: #6b7280;">${item.subtotal > 0 ? formatCurrency(item.subtotal) : '-'}</td>
                            <td style="padding: 14px 16px; text-align: right; font-size: 0.85rem; color: #ef4444;">${item.descuento > 0 ? '-' + formatCurrency(item.descuento) : '-'}</td>
                            <td style="padding: 14px 16px; text-align: right; font-size: 0.85rem; color: #6b7280;">${item.itbis > 0 ? formatCurrency(item.itbis) : '-'}</td>
                            <td style="padding: 14px 16px; text-align: right; font-weight: 700; font-size: 0.95rem; color: ${colorCat};">${formatCurrency(item.monto)}</td>
                            <td style="padding: 14px 16px; text-align: center;">
                                <button onclick="editarItem(${item.id})" title="Editar" style="padding: 6px 10px; background: #f3f4f6; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem;">✏️</button>
                                <button onclick="eliminarItem(${item.id})" title="Eliminar" style="padding: 6px 10px; background: #fee2e2; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; color: #ef4444;">🗑️</button>
                            </td>
                        </tr>
                    `;
                });
            }
            
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }
        
        function renderListaUnica(items, titulo, color) {
            const container = document.getElementById('seccionesContainer');
            const total = items.reduce((s, i) => s + i.monto, 0);
            
            let html = `
                <div style="background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
                    <div style="background: linear-gradient(135deg, ${color}20 0%, ${color}10 100%); padding: 1.25rem 1.5rem; border-bottom: 1px solid ${color}30; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <h3 style="margin: 0; font-size: 1.2rem; color: ${color}; font-weight: 700;">${titulo}</h3>
                            <span style="font-size: 0.8rem; color: #6b7280;">${items.length} registro${items.length !== 1 ? 's' : ''}</span>
                        </div>
                        <div style="text-align: right;">
                            <span style="font-size: 0.75rem; color: ${color}; text-transform: uppercase; letter-spacing: 1px;">Total</span>
                            <div style="font-size: 1.5rem; font-weight: 700; color: ${color};">${formatCurrency(total)}</div>
                        </div>
                    </div>
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="background: linear-gradient(135deg, ${color} 0%, ${color}cc 100%);">
                                <th style="padding: 14px 16px; text-align: left; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Fecha</th>
                                <th style="padding: 14px 16px; text-align: left; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Hora</th>
                                <th style="padding: 14px 16px; text-align: left; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Descripción</th>
                                <th style="padding: 14px 16px; text-align: left; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Pago</th>
                                <th style="padding: 14px 16px; text-align: right; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Subtotal</th>
                                <th style="padding: 14px 16px; text-align: right; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Desc.</th>
                                <th style="padding: 14px 16px; text-align: right; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">ITBIS</th>
                                <th style="padding: 14px 16px; text-align: right; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Total</th>
                                <th style="padding: 14px 16px; text-align: center; font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px;">Acción</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            if (items.length === 0) {
                html += '<tr><td colspan="9" style="padding: 3rem; text-align: center; color: #6b7280;">Sin registros</td></tr>';
            } else {
                const itemsOrdenados = [...items].sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
                
                itemsOrdenados.forEach(item => {
                    const colorCat = item.categoria === 'costo_ventas' ? '#f59e0b' : item.categoria === 'gastos_operativos' ? '#8b5cf6' : item.categoria === 'gastos_personales' ? '#ef4444' : '#6b7280';
                    const mp = item.metodo_pago || 'efectivo';
                    const colorPago = mp === 'efectivo' ? '#10b981' : mp === 'tarjeta' ? '#f59e0b' : '#3b82f6';
                    const labelPago = mp === 'efectivo' ? '💵 Efectivo' : mp === 'tarjeta' ? '💳 Tarjeta' : '🏦 Transf.';
                    
                    html += `
                        <tr style="border-bottom: 1px solid #f3f4f6;">
                            <td style="padding: 14px 16px; font-size: 0.85rem; color: #6b7280; white-space: nowrap;">${formatDate(item.fecha)}</td>
                            <td style="padding: 14px 16px; font-size: 0.8rem; color: #9ca3af; white-space: nowrap;">${item.hora ? item.hora.substring(0, 5) : '-'}</td>
                            <td style="padding: 14px 16px; font-weight: 500; color: #1f2937; font-size: 0.9rem;">${escapeHtml(item.descripcion)}</td>
                            <td style="padding: 14px 16px;">
                                <span style="font-size: 0.7rem; font-weight: 600; color: ${colorPago}; background: ${colorPago}15; padding: 3px 8px; border-radius: 10px;">${labelPago}</span>
                            </td>
                            <td style="padding: 14px 16px; text-align: right; font-size: 0.85rem; color: #6b7280;">${item.subtotal > 0 ? formatCurrency(item.subtotal) : '-'}</td>
                            <td style="padding: 14px 16px; text-align: right; font-size: 0.85rem; color: #ef4444;">${item.descuento > 0 ? '-' + formatCurrency(item.descuento) : '-'}</td>
                            <td style="padding: 14px 16px; text-align: right; font-size: 0.85rem; color: #6b7280;">${item.itbis > 0 ? formatCurrency(item.itbis) : '-'}</td>
                            <td style="padding: 14px 16px; text-align: right; font-weight: 700; font-size: 0.95rem; color: ${color};">${formatCurrency(item.monto)}</td>
                            <td style="padding: 14px 16px; text-align: center;">
                                <button onclick="editarItem(${item.id})" title="Editar" style="padding: 6px 10px; background: #f3f4f6; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem;">✏️</button>
                                <button onclick="eliminarItem(${item.id})" title="Eliminar" style="padding: 6px 10px; background: #fee2e2; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; color: #ef4444;">🗑️</button>
                            </td>
                        </tr>
                    `;
                });
            }
            
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }
        
        const categoriasConfig = {
            todas: [
                { value: 'costo_ventas', label: 'Costo de Ventas' },
                { value: 'gastos_operativos', label: 'Gastos Fijos' },
                { value: 'gastos_personales', label: 'Gastos Personales' },
                { value: 'otros_gastos', label: 'Otros Costos' }
            ]
        };
        
        function calcularTotal() {
            const subtotal = parseFloat(document.getElementById('itemSubtotal').value) || 0;
            const descuento = parseFloat(document.getElementById('itemDescuento').value) || 0;
            const itbis = parseFloat(document.getElementById('itemItbis').value) || 0;
            const total = subtotal - descuento + itbis;
            document.getElementById('itemMonto').value = total.toFixed(2);
        }
        
        function actualizarSubtipo() {
            const catSeleccionada = document.getElementById('itemCategoria').value;
            let subtipo = 'costo';
            if (catSeleccionada === 'gastos_personales') {
                subtipo = 'gasto';
            }
            document.getElementById('itemCategoria').dataset.subtipo = subtipo;
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            const session = await checkSession();
            if (!session || !session.authenticated) {
                window.location.href = '/';
                return;
            }
            
            setFiltro('mes');
        });
        
        function setFiltro(tipo, btn) {
            document.querySelectorAll('.filtros-fecha .btn-filtro').forEach(b => b.classList.remove('activo'));
            if (btn) btn.classList.add('activo');
            
            filtroTurno = tipo === 'turno';
            
            if (filtroTurno) {
                cargarDatos();
                return;
            }
            
            const hoy = new Date();
            let desde, hasta;
            
            if (tipo === 'hoy') {
                desde = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
                hasta = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());
            } else if (tipo === 'mes') {
                desde = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
                hasta = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0);
            } else if (tipo === 'mesAnterior') {
                desde = new Date(hoy.getFullYear(), hoy.getMonth() - 1, 1);
                hasta = new Date(hoy.getFullYear(), hoy.getMonth(), 0);
            }
            
            document.getElementById('fechaDesde').value = formatDateISO(desde);
            document.getElementById('fechaHasta').value = formatDateISO(hasta);
            cargarDatos();
        }
        
        function formatDateISO(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }
        
        async function cargarDatos() {
            const desde = document.getElementById('fechaDesde').value;
            const hasta = document.getElementById('fechaHasta').value;
            
            let url = '/estado-resultado?';
            if (filtroTurno) {
                url += 'turno=actual';
            } else {
                url += `desde=${desde}&hasta=${hasta}`;
            }
            
            try {
                datosActuales = await apiCall(url);
                
                const costos = datosActuales.items.filter(i => i.tipo === 'gasto' && (i.subtipo === 'costo' || !i.subtipo));
                const gastos = datosActuales.items.filter(i => i.tipo === 'gasto' && i.subtipo === 'gasto');
                
                const totalCostos = costos.reduce((s, i) => s + i.monto, 0);
                const totalGastos = gastos.reduce((s, i) => s + i.monto, 0);
                
                document.getElementById('heroCostos').textContent = formatCurrency(totalCostos);
                document.getElementById('heroCountCostos').textContent = costos.length;
                document.getElementById('heroGastos').textContent = formatCurrency(totalGastos);
                document.getElementById('heroCountGastos').textContent = gastos.length;
                
                renderSeccionesFiltradas();
            } catch (error) {
                console.error('Error:', error);
                showToast(error.message, 'error');
            }
        }
        
        function abrirModal() {
            editandoId = null;
            document.getElementById('modalTitulo').textContent = 'Nuevo Registro';
            document.getElementById('itemId').value = '';
            
            const select = document.getElementById('itemCategoria');
            select.innerHTML = categoriasConfig.todas.map(c => `<option value="${c.value}">${c.label}</option>`).join('');
            
            document.getElementById('itemDescripcion').value = '';
            document.getElementById('itemSubtotal').value = '';
            document.getElementById('itemDescuento').value = '0';
            document.getElementById('itemItbis').value = '0';
            document.getElementById('itemMonto').value = '';
            document.getElementById('itemFecha').value = formatDateISO(new Date());
            document.getElementById('itemMetodoPago').value = 'efectivo';
            document.getElementById('itemNotas').value = '';
            
            const catSeleccionada = select.value;
            let subtipo = 'costo';
            if (catSeleccionada === 'gastos_personales') {
                subtipo = 'gasto';
            }
            select.dataset.subtipo = subtipo;
            
            document.getElementById('modalItem').classList.add('active');
        }
        
        async function editarItem(id) {
            const item = datosActuales.items.find(i => i.id === id);
            if (!item) return;
            
            editandoId = id;
            document.getElementById('modalTitulo').textContent = 'Editar Registro';
            document.getElementById('itemId').value = id;
            
            const select = document.getElementById('itemCategoria');
            select.innerHTML = categoriasConfig.todas.map(c => `<option value="${c.value}">${c.label}</option>`).join('');
            select.value = item.categoria;
            select.dataset.subtipo = item.subtipo || 'costo';
            
            document.getElementById('itemDescripcion').value = item.descripcion;
            document.getElementById('itemSubtotal').value = item.subtotal || '';
            document.getElementById('itemItbis').value = item.itbis || '';
            document.getElementById('itemDescuento').value = item.descuento || '';
            document.getElementById('itemMonto').value = item.monto;
            document.getElementById('itemFecha').value = item.fecha;
            document.getElementById('itemMetodoPago').value = item.metodo_pago || 'efectivo';
            document.getElementById('itemNotas').value = item.notas || '';
            
            document.getElementById('modalItem').classList.add('active');
        }
        
        function cerrarModal() {
            document.getElementById('modalItem').classList.remove('active');
            editandoId = null;
        }
        
        async function guardarItem() {
            const monto = parseFloat(document.getElementById('itemMonto').value) || 0;
            
            if (!document.getElementById('itemDescripcion').value || monto <= 0 || !document.getElementById('itemFecha').value) {
                showToast('Descripción, Total y Fecha son requeridos', 'error');
                return;
            }
            
            const data = {
                tipo: 'gasto',
                subtipo: document.getElementById('itemCategoria').dataset.subtipo || 'costo',
                categoria: document.getElementById('itemCategoria').value,
                descripcion: toTitleCase(document.getElementById('itemDescripcion').value),
                subtotal: parseFloat(document.getElementById('itemSubtotal').value) || 0,
                itbis: parseFloat(document.getElementById('itemItbis').value) || 0,
                descuento: parseFloat(document.getElementById('itemDescuento').value) || 0,
                monto: monto,
                metodo_pago: document.getElementById('itemMetodoPago').value,
                fecha: document.getElementById('itemFecha').value,
                notas: capitalizeFirst(document.getElementById('itemNotas').value) || null
            };
            
            try {
                if (editandoId) {
                    await apiCall(`/estado-resultado/${editandoId}`, {
                        method: 'PUT',
                        body: JSON.stringify(data)
                    });
                    showToast('Registro actualizado', 'success');
                } else {
                    await apiCall('/estado-resultado', {
                        method: 'POST',
                        body: JSON.stringify(data)
                    });
                    showToast('Registro guardado', 'success');
                }
                
                cerrarModal();
                cargarDatos();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function eliminarItem(id) {
            showModalConfirm('¿Eliminar este registro?', async () => {
                try {
                    await apiCall(`/estado-resultado/${id}`, { method: 'DELETE' });
                    showToast('Registro eliminado', 'success');
                    cargarDatos();
                } catch (error) {
                    showToast(error.message, 'error');
                }
            });
        }
        
        function toTitleCase(str) {
            if (!str) return '';
            return str.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
        }
        
        function capitalizeFirst(str) {
            if (!str || !str.trim()) return '';
            const s = str.trim();
            return s.charAt(0).toUpperCase() + s.slice(1);
        }
        
        function formatCurrency(amount) {
            return 'RD$' + Number(amount || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const [year, month, day] = dateStr.split('-').map(Number);
            return new Date(year, month - 1, day).toLocaleDateString('es-DO', { day: '2-digit', month: 'short' });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
    </script>
    <script src="/js/license-banner.js"></script>
</body>
</html>
