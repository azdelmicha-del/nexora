<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Nexora - Servicios</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .imagen-upload-container {
            border: 2px dashed var(--gray-200);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            background: var(--gray-50);
        }
        
        .imagen-upload-container:hover {
            border-color: var(--primary);
            background: #f0f4ff;
        }
        
        .imagen-upload-container.has-image {
            border-style: solid;
            border-color: var(--primary);
            background: white;
        }
        
        .imagen-preview {
            max-width: 100%;
            max-height: 180px;
            border-radius: 8px;
            object-fit: cover;
        }
        
        .imagen-upload-placeholder {
            color: var(--gray-400);
            padding: 1rem;
        }
        
        .imagen-upload-placeholder svg {
            margin-bottom: 0.5rem;
        }
        
        .imagen-upload-placeholder p {
            font-size: 0.8rem;
            margin: 0;
        }
        
        .imagen-remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .imagen-input-hidden {
            display: none;
        }
        
        .imagen-tamanio {
            font-size: 0.7rem;
            color: var(--gray-400);
            margin-top: 0.5rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Sidebar dinámico -->
        
        <main class="main-content">
            <div class="page-header">
                <h1>Gestión de Servicios</h1>
                <button class="btn btn-primary" onclick="openModal()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Nuevo Servicio
                </button>
            </div>
            
            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Precio</th>
                                <th>Duración</th>
                                <th>Comisión</th>
                                <th>ITBIS</th>
                                <th>Categoría</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="serviciosTable">
                            <tr><td colspan="6"><div class="spinner"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Nuevo Servicio</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="servicioForm">
                <div class="modal-body">
                    <input type="hidden" id="servicioId">
                    <div class="form-group">
                        <label for="nombre">Nombre del servicio</label>
                        <input type="text" id="nombre" required placeholder="Ej: Corte de cabello">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="precio">Precio</label>
                            <input type="number" id="precio" step="0.01" min="0" required placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="duracion">Duración</label>
                            <select id="duracion" required>
                                <option value="5">5 minutos</option>
                                <option value="10">10 minutos</option>
                                <option value="15">15 minutos</option>
                                <option value="20">20 minutos</option>
                                <option value="25">25 minutos</option>
                                <option value="30" selected>30 minutos</option>
                                <option value="35">35 minutos</option>
                                <option value="40">40 minutos</option>
                                <option value="45">45 minutos</option>
                                <option value="50">50 minutos</option>
                                <option value="55">55 minutos</option>
                                <option value="60">1 hora</option>
                                <option value="75">1 hora 15 minutos</option>
                                <option value="90">1 hora 30 minutos</option>
                                <option value="105">1 hora 45 minutos</option>
                                <option value="120">2 horas</option>
                                <option value="150">2 horas 30 minutos</option>
                                <option value="180">3 horas</option>
                                <option value="210">3 horas 30 minutos</option>
                                <option value="240">4 horas</option>
                                <option value="270">4 horas 30 minutos</option>
                                <option value="300">5 horas</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="itbis_tasa">ITBIS (%)</label>
                            <select id="itbis_tasa">
                                <option value="18" selected>18% — General</option>
                                <option value="16">16% — Tasa reducida</option>
                                <option value="8">8% — Tasa especial</option>
                                <option value="0">0% — Exento</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="costo_insumo_estimado">Costo de Insumos</label>
                            <input type="number" id="costo_insumo_estimado" step="0.01" min="0" placeholder="0.00"
                                   title="Costo estimado de insumos consumidos al prestar este servicio">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="comision_porcentaje">Comision del Empleado (%)</label>
                            <input type="number" id="comision_porcentaje" step="0.5" min="0" max="100" value="0" placeholder="0"
                                   title="Porcentaje de comision que recibe el empleado por este servicio">
                        </div>
                        <div class="form-group" style="display:flex;align-items:flex-end;">
                            <small style="color:var(--gray-400);font-size:0.72rem;">0% = sin comision. Ej: 10% = el empleado recibe 10% del subtotal</small>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="categoria_id">Categoría</label>
                        <select id="categoria_id">
                            <option value="">Sin categoría</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" rows="3" placeholder="Descripción opcional del servicio"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Foto del servicio</label>
                        <div class="imagen-upload-container" id="imagenContainer" onclick="document.getElementById('imagenInput').click()">
                            <input type="file" id="imagenInput" class="imagen-input-hidden" accept="image/*" onchange="handleImagen(this)">
                            <div class="imagen-upload-placeholder" id="imagenPlaceholder">
                                <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                <p>Haz clic para subir una foto</p>
                            </div>
                            <img id="imagenPreview" class="imagen-preview" style="display:none;" alt="Preview">
                            <button type="button" class="imagen-remove-btn" id="imagenRemove" style="display:none;" onclick="event.stopPropagation(); removeImagen()">×</button>
                        </div>
                        <input type="hidden" id="imagenData" value="">
                    </div>
                    <div class="form-group" id="estadoGroup" style="display: none;">
                        <label for="estado">Estado</label>
                        <select id="estado">
                            <option value="activo">Activo</option>
                            <option value="inactivo">Inactivo</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btnGuardar">Guardar</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="/js/api.js"></script>
    <script>
        let editingId = null;
        let categorias = [];
        
        function handleImagen(input) {
            const file = input.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                showToast('El archivo seleccionado no es una imagen', 'error');
                return;
            }
            
            // Mostrar estado de carga
            document.getElementById('imagenPlaceholder').innerHTML = `
                <div style="padding:1rem;">
                    <div style="width:32px; height:32px; border:3px solid #667eea; border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto;"></div>
                    <p style="margin-top:0.5rem; font-size:0.8rem; color:#999;">Procesando imagen...</p>
                </div>
            `;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onerror = function() {
                    showToast('No se pudo cargar la imagen. Intenta con otra.', 'error');
                    removeImagen();
                };
                img.onload = function() {
                    try {
                        let compressed = compressImage(img, 600, 0.7);
                        
                        // Si sigue muy grande, comprimir más agresivamente
                        if (compressed.length > 500000) {
                            compressed = compressImage(img, 400, 0.5);
                        }
                        
                        // Si AÚN es grande, reducir más
                        if (compressed.length > 500000) {
                            compressed = compressImage(img, 300, 0.4);
                        }
                        
                        document.getElementById('imagenData').value = compressed;
                        document.getElementById('imagenPreview').src = compressed;
                        document.getElementById('imagenPreview').style.display = 'block';
                        document.getElementById('imagenPlaceholder').style.display = 'none';
                        document.getElementById('imagenRemove').style.display = 'flex';
                        document.getElementById('imagenContainer').classList.add('has-image');
                    } catch (err) {
                        showToast('Error al procesar la imagen', 'error');
                        removeImagen();
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function compressImage(img, maxSize, quality) {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            
            if (width > height) {
                if (width > maxSize) {
                    height *= maxSize / width;
                    width = maxSize;
                }
            } else {
                if (height > maxSize) {
                    width *= maxSize / height;
                    height = maxSize;
                }
            }
            
            canvas.width = Math.round(width);
            canvas.height = Math.round(height);
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            return canvas.toDataURL('image/jpeg', quality);
        }
        
        function removeImagen() {
            document.getElementById('imagenInput').value = '';
            document.getElementById('imagenData').value = '';
            document.getElementById('imagenPreview').style.display = 'none';
            document.getElementById('imagenPreview').src = '';
            document.getElementById('imagenPlaceholder').style.display = 'block';
            document.getElementById('imagenRemove').style.display = 'none';
            document.getElementById('imagenContainer').classList.remove('has-image');
        }
        
        function showImagenPreview(base64) {
            if (base64) {
                document.getElementById('imagenData').value = base64;
                document.getElementById('imagenPreview').src = base64;
                document.getElementById('imagenPreview').style.display = 'block';
                document.getElementById('imagenPlaceholder').style.display = 'none';
                document.getElementById('imagenRemove').style.display = 'flex';
                document.getElementById('imagenContainer').classList.add('has-image');
            } else {
                removeImagen();
            }
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            const licenseOk = await requireLicense();
            if (!licenseOk) return;
            
            const session = await checkSession();
            if (!session || !session.authenticated) {
                window.location.href = '/';
                return;
            }
            
            if (session.user.rol !== 'admin') {
                document.querySelector('.page-header button').style.display = 'none';
            }
            
            const status = await checkLicense();
            if (status.type === 'trial' && status.daysRemaining > 0) {
                showTrialBanner(status.daysRemaining);
            }
            
            await loadCategorias();
            await loadServicios();
            
            document.getElementById('servicioForm').addEventListener('submit', handleSubmit);
        });
        
        function toTitleCase(str) {
            return str.toLowerCase().replace(/(?:^|\s)\S/g, c => c.toUpperCase());
        }
        
        function capitalizeFirst(str) {
            if (!str || !str.trim()) return '';
            const s = str.trim();
            return s.charAt(0).toUpperCase() + s.slice(1);
        }
        
        async function loadCategorias() {
            try {
                categorias = await apiCall('/categories');
                const select = document.getElementById('categoria_id');
                select.innerHTML = '<option value="">Sin categoría</option>' + 
                    categorias.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
            } catch (error) {
                console.error('Error cargando categorías:', error);
            }
        }
        
        async function loadServicios() {
            const tbody = document.getElementById('serviciosTable');
            tbody.innerHTML = getSkeletonHTML('table', 5);
            
            try {
                const servicios = await apiCall('/services');
                
                if (servicios.length === 0) {
                    tbody.innerHTML = getEmptyStateHTML(
                        '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>',
                        'Sin servicios registrados',
                        'Comienza agregando tu primer servicio para comenzar a vender.',
                        'Agregar Servicio',
                        'openModal()'
                    ).replace('<div class="empty-state">', '<tr><td colspan="6"><div class="empty-state">').replace('</div>', '</div></td></tr>');
                    return;
                }
                
                tbody.innerHTML = servicios.map(s => {
                    const nombreEsc = (s.nombre || '').replace(/'/g, "\\'");
                    const imgThumb = s.imagen ? `<img src="${s.imagen}" style="width:36px; height:36px; border-radius:8px; object-fit:cover; vertical-align:middle; margin-right:8px;">` : '';
                    return `
                    <tr class="fade-in">
                        <td><strong>${imgThumb}${escapeHtml(s.nombre)}</strong></td>
                        <td>${formatCurrency(s.precio)}</td>
                        <td>${formatDuracion(s.duracion)}</td>
                        <td>${s.comision_porcentaje > 0 ? '<span style="background:#ede9fe;color:#5b21b6;padding:2px 8px;border-radius:10px;font-size:0.78rem;font-weight:700;">'+s.comision_porcentaje+'%</span>' : '<span class="text-muted">—</span>'}</td>
                        <td><span style="font-size:0.78rem;color:#8b5cf6;">${s.itbis_tasa || 18}%</span></td>
                        <td>${s.categoria || '<span class="text-muted">-</span>'}</td>
                        <td><span class="badge badge-${s.estado === 'activo' ? 'success' : 'danger'}">${s.estado}</span></td>
                        <td class="actions">
                            ${sessionStorage.getItem('userRol') === 'admin' ? 
                                `<button class="btn btn-secondary btn-sm" onclick="editServicio(${s.id})">Editar</button>
                                 <button class="btn btn-danger btn-sm" onclick="deleteServicio(${s.id}, '${nombreEsc}')">Eliminar</button>` : 
                                ''}
                        </td>
                    </tr>
                `}).join('');
            } catch (error) {
                tbody.innerHTML = getEmptyStateHTML(
                    '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>',
                    'Error al cargar servicios',
                    'No se pudieron cargar los servicios. Intenta de nuevo.'
                ).replace('<div class="empty-state">', '<tr><td colspan="6"><div class="empty-state">').replace('</div>', '</div></td></tr>');
            }
        }
        
        async function loadServicio(id) {
            try {
                const s = await apiCall(`/services/${id}`);
                document.getElementById('servicioId').value = s.id;
                document.getElementById('nombre').value = s.nombre;
                document.getElementById('precio').value = s.precio;
                document.getElementById('duracion').value = s.duracion;
                document.getElementById('categoria_id').value = s.categoria_id || '';
                document.getElementById('descripcion').value = s.descripcion || '';
                document.getElementById('estado').value = s.estado;
                document.getElementById('itbis_tasa').value = (s.itbis_tasa !== null && s.itbis_tasa !== undefined) ? String(s.itbis_tasa) : '18';
                document.getElementById('costo_insumo_estimado').value = parseFloat(s.costo_insumo_estimado || 0).toFixed(2);
                document.getElementById('comision_porcentaje').value = parseFloat(s.comision_porcentaje || 0).toFixed(1);
                if (s.imagen) {
                    document.getElementById('imagenData').value = s.imagen;
                    showImagenPreview(s.imagen);
                }
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        function openModal(id = null) {
            editingId = id;
            document.getElementById('modalTitle').textContent = id ? 'Editar Servicio' : 'Nuevo Servicio';
            document.getElementById('estadoGroup').style.display = id ? 'block' : 'none';
            document.getElementById('servicioForm').reset();
            removeImagen();
            
            if (id) {
                loadServicio(id);
            }
            
            document.getElementById('modalOverlay').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            editingId = null;
        }
        
        function formatDuracion(minutos) {
            if (minutos < 60) {
                return `${minutos} min`;
            } else {
                const horas = Math.floor(minutos / 60);
                const mins = minutos % 60;
                if (mins === 0) {
                    return `${horas} ${horas === 1 ? 'hora' : 'horas'}`;
                }
                return `${horas}h ${mins}m`;
            }
        }
        
        async function loadServicio(id) {
            try {
                const servicio = await apiCall(`/services/${id}`);
                document.getElementById('servicioId').value = servicio.id;
                document.getElementById('nombre').value = servicio.nombre;
                document.getElementById('precio').value = servicio.precio;
                document.getElementById('duracion').value = servicio.duracion;
                document.getElementById('categoria_id').value = servicio.categoria_id || '';
                document.getElementById('descripcion').value = servicio.descripcion || '';
                document.getElementById('estado').value = servicio.estado;
                // Campos fiscales — itbis_tasa default 18 si el backend devuelve null
                const tasaGuardada = (servicio.itbis_tasa !== null && servicio.itbis_tasa !== undefined)
                    ? String(servicio.itbis_tasa)
                    : '18';
                document.getElementById('itbis_tasa').value = tasaGuardada;
                document.getElementById('costo_insumo_estimado').value =
                    parseFloat(servicio.costo_insumo_estimado || 0).toFixed(2);
                showImagenPreview(servicio.imagen);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        async function editServicio(id) {
            openModal(id);
        }
        
        async function handleSubmit(e) {
            e.preventDefault();
            
            const nombreInput = document.getElementById('nombre');
            const precioInput = document.getElementById('precio');
            const duracionInput = document.getElementById('duracion');
            
            let isValid = true;
            if (!validateField(nombreInput, validators.required)) isValid = false;
            if (!validateField(precioInput, validators.positiveNumber)) isValid = false;
            if (!validateField(duracionInput, (v) => v && parseInt(v) > 0 ? true : 'Debe ser mayor a 0')) isValid = false;
            
            if (!isValid) return;
            
            const btn = document.getElementById('btnGuardar');
            btn.classList.add('btn-loading');
            btn.disabled = true;
            
            const data = {
                nombre: toTitleCase(nombreInput.value.trim()),
                precio: parseFloat(precioInput.value),
                duracion: parseInt(duracionInput.value),
                categoria_id: document.getElementById('categoria_id').value || null,
                descripcion: capitalizeFirst(document.getElementById('descripcion').value) || null,
                estado: document.getElementById('estado').value,
                imagen: document.getElementById('imagenData').value || null,
                // Campos fiscales
                itbis_tasa: parseInt(document.getElementById('itbis_tasa').value, 10),
                costo_insumo_estimado: parseFloat(document.getElementById('costo_insumo_estimado').value) || 0,
                // Comision por servicio
                comision_porcentaje: parseFloat(document.getElementById('comision_porcentaje').value) || 0
            };
            
            try {
                if (editingId) {
                    await apiCall(`/services/${editingId}`, {
                        method: 'PUT',
                        body: JSON.stringify(data)
                    });
                    showToast('Servicio actualizado correctamente', 'success');
                } else {
                    await apiCall('/services', {
                        method: 'POST',
                        body: JSON.stringify(data)
                    });
                    showToast('Servicio creado correctamente', 'success');
                }
                
                closeModal();
                await loadServicios();
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                btn.classList.remove('btn-loading');
                btn.disabled = false;
            }
        }
        
        async function deleteServicio(id, nombre) {
            if (!confirm(`¿Está seguro que desea eliminar el servicio "${nombre}"?`)) return;
            try {
                await apiCall(`/services/${id}`, { method: 'DELETE' });
                showToast('Servicio eliminado correctamente', 'success');
                await loadServicios();
            } catch (error) {
                showToast(error.message || 'Error al eliminar servicio', 'error');
            }
        }
        
        function formatCurrency(amount) {
            return '$' + parseFloat(amount || 0).toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
        }
    </script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/license-banner.js"></script>
</body>
</html>
